<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APD Dispatch Watch &amp; RDO Bid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --navy: #0a1f3d;
    --navy-deep: #061429;
    --navy-light: #15355e;
    --gold: #c9a961;
    --gold-bright: #e6c478;
    --paper: #f5f2eb;
    --paper-dark: #e8e3d6;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --line: #c9c2b0;
    --rdo: #1a4d7a;
    --rdo-light: #2e6ba1;
    --vac: #8b3a1f;
    --vac-light: #b04d2a;
    --weekend: #ebe5d2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  body {
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 38px,
        rgba(10, 31, 61, 0.04) 38px,
        rgba(10, 31, 61, 0.04) 39px
      );
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--navy);
    color: var(--paper);
    padding: 24px 32px;
    border-bottom: 4px solid var(--gold);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 200px;
    background: linear-gradient(135deg, transparent 0%, rgba(201, 169, 97, 0.08) 100%);
    pointer-events: none;
  }
  .badge-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .shield {
    /* Dispatcher badge — embedded as a transparent PNG so it sits cleanly on
       the navy header without a visible square background. The image's natural
       aspect is 1:1; we display it at 60px tall to roughly match the original
       shield's vertical footprint. width:auto keeps the aspect intact. */
    height: 64px;
    width: auto;
    flex-shrink: 0;
    /* Subtle drop shadow to give the gold lines a touch of depth on the navy. */
    filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.35));
  }
  .title-block h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1;
  }
  .title-block .subtitle {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-bright);
    margin-top: 6px;
    font-weight: 500;
  }

  /* ===== MASTER PICKER ===== */
  .picker {
    background: white;
    border: 1px solid var(--line);
    border-top: none;
    padding: 24px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .picker-label {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-right: 8px;
  }
  .mode-btn {
    background: var(--paper);
    border: 2px solid var(--line);
    padding: 12px 28px;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .mode-btn:hover {
    border-color: var(--navy);
    color: var(--navy);
  }
  .mode-btn.active {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--paper);
  }
  .mode-btn.active::before {
    content: '▸ ';
    color: var(--gold-bright);
  }

  /* ===== FORM CARD ===== */
  .card {
    background: white;
    border: 1px solid var(--line);
    border-top: none;
    padding: 32px;
  }
  .card-title {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--navy);
    border-bottom: 2px solid var(--gold);
    padding-bottom: 8px;
    margin-bottom: 24px;
    display: inline-block;
  }

  .field-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    /* Uniform 20px spacing in both directions — matches the horizontal gap
       between adjacent fields in a row (e.g. Name↔Watch). Previously the row
       gap was 16px and column gap 20px, which made vertical spacing between
       rows feel tighter than horizontal spacing within a row. Applies on
       desktop and mobile. */
    gap: 20px;
    margin-bottom: 24px;
  }
  .field-grid.four-col {
    /* Columns: Name | Watch | Serial | Classification.
       Name and Classification are the two long-content fields, sized equally
       at 2fr each so the row reads as a balanced left/right pairing. Watch
       (a single digit 1/2/3) and Serial (5-char A1234) are the two short
       fields, both 0.5fr. Total = 5fr; the row's right edge then justifies
       cleanly against the full-width Bid Period dropdown below. */
    grid-template-columns: 2fr 0.5fr 0.5fr 2fr;
  }
  .field {
    display: flex;
    flex-direction: column;
    /* Allow the field to shrink below its content's intrinsic width when
       used inside a CSS Grid track. Without this, a <select> with a long
       option (e.g. "Comm Information Rep") forces the 1fr grid track to
       be ~200px wide, blowing the card past the mobile viewport edge. */
    min-width: 0;
  }
  .field.full { grid-column: 1 / -1; }
  label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  /* Field labels in the 4-col header row must stay single-line. The Serial №
     cell is naturally narrow (~60-80px depending on viewport) and "SERIAL №"
     with letter-spacing only just fits. Without nowrap, on viewports around
     360px the label wraps to two lines, making that cell taller than its
     row neighbors and throwing the row out of alignment. Scope is restricted
     to the four-col grid so longer section headings ("Requested Watch
     Assignment...", "Comments / Special Considerations...") can still wrap. */
  .field-grid.four-col > .field > label {
    white-space: nowrap;
  }
  input[type="text"], input[type="number"], select {
    border: 1px solid var(--line);
    background: var(--paper);
    padding: 10px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s;
    /* Default to filling the parent .field width, but allow shrinking when
       grid space is tight. min-width: 0 + width: 100% means the element
       respects its grid track width instead of expanding to its content. */
    width: 100%;
    min-width: 0;
    box-sizing: border-box;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    outline: none;
    border-color: var(--navy);
    background: white;
  }
  /* Serial input fills its grid cell exactly. The cell is naturally narrow
     (~80px on both desktop and mobile via the column structure), which is
     still plenty for "A1234". Filling the cell — instead of pinning to a
     fixed 96–120px range — guarantees the visual gap to Classification is
     exactly the 20px column gap, not a value reduced by input overflow. */
  #w-serial {
    width: 100%;
  }

  /* ===== BID MODE TOGGLE ===== */
  .bid-mode-toggle {
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    margin: 4px 0 12px;
  }
  .bid-mode-toggle .bm-opt {
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .bid-mode-toggle .bm-opt.active {
    background: var(--ink-deep);
    color: var(--gold-bright);
  }
  .bid-mode-toggle .bm-opt:not(.active):hover {
    color: var(--ink-deep);
  }

  /* ===== FULL-YEAR WATCH GROUP CARDS ===== */
  .fy-watch-groups {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .fy-watch-group {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 16px 16px;
    background: var(--paper);
  }
  .fy-watch-group .fy-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .fy-watch-group .fy-head .fy-title {
    font-weight: 700;
    font-size: 14px;
    color: var(--ink-deep);
  }
  .fy-watch-group .fy-head .fy-range {
    font-size: 11px;
    color: var(--ink-soft);
  }
  .fy-watch-group .watch-options {
    grid-template-columns: repeat(3, 1fr);
  }
  .fy-watch-group .watch-opt {
    padding: 12px 8px 0;
    min-height: 78px;
  }
  .fy-watch-group .watch-opt .w-num { font-size: 32px; }
  .fy-watch-group .watch-opt .w-label { font-size: 11px; }
  .fy-watch-group .watch-opt .w-status { font-size: 10px; padding: 4px 0; }

  /* ===== WATCH PICKER ===== */
  .watch-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .watch-opt {
    background: var(--paper);
    border: 2px solid var(--line);
    padding: 18px 12px 0;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    overflow: hidden;
    position: relative;
  }
  .watch-opt:hover {
    border-color: var(--navy);
    transform: translateY(-1px);
  }
  .watch-opt .w-num {
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    letter-spacing: 0.04em;
  }
  .watch-opt .w-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 6px;
    margin-bottom: 14px;
  }
  .watch-opt .w-status {
    background: var(--paper-dark);
    color: var(--ink-soft);
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 8px 4px;
    margin: 0 -12px;
    transition: all 0.15s;
    font-weight: 500;
  }

  /* 1ST CHOICE state */
  .watch-opt.c-1 {
    background: var(--navy);
    border-color: var(--gold);
  }
  .watch-opt.c-1 .w-num { color: var(--gold-bright); }
  .watch-opt.c-1 .w-label { color: white; }
  .watch-opt.c-1 .w-status {
    background: var(--gold);
    color: var(--navy);
    font-weight: 700;
  }

  /* 2ND CHOICE state */
  .watch-opt.c-2 {
    background: var(--paper-dark);
    border-color: var(--navy);
  }
  .watch-opt.c-2 .w-num { color: var(--navy); }
  .watch-opt.c-2 .w-label { color: var(--ink-soft); }
  .watch-opt.c-2 .w-status {
    background: var(--navy);
    color: var(--gold-bright);
    font-weight: 700;
  }

  .dp-range {
    background: var(--paper);
    border-left: 3px solid var(--gold);
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 14px;
  }
  .dp-range strong {
    font-family: 'Oswald', sans-serif;
    color: var(--navy);
    letter-spacing: 0.04em;
  }
  .dp-range-list {
    margin-top: 6px;
    color: var(--ink-soft);
    font-size: 13px;
  }

  /* ===== RDO SLOT PANELS (stacked, one per DP) ===== */
  .rdo-slot {
    border: 1px solid var(--line);
    background: var(--paper);
    margin-bottom: 18px;
    overflow: hidden;
  }
  .rdo-slot-head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: var(--navy);
    color: var(--paper);
    flex-wrap: wrap;
  }
  .rdo-slot-head .slot-label {
    font-family: 'Oswald', sans-serif;
    line-height: 1;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--navy);
    background: var(--gold-bright);
    padding: 6px 14px;
    border-radius: 4px;
    margin-right: 4px;
    min-width: 78px;
    text-align: center;
    box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.15);
    display: inline-flex;
    flex-direction: column;
    gap: 2px;
  }
  .rdo-slot-head .slot-label .slot-dp-num {
    font-size: 22px;
    /* Defines the horizontal space the YYYY line needs to fill. */
  }
  .rdo-slot-head .slot-label .slot-dp-year {
    font-size: 13px;
    font-weight: 600;
    opacity: 0.85;
    /* Distribute the 4 year digits across the full badge width using
       text-align: justify with each character treated as a word via
       wbr-like spacing. The JS sets the appropriate letter-spacing. */
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 0 1px;
    box-sizing: border-box;
  }
  .rdo-slot-head .slot-label .slot-dp-year span {
    flex: 0 0 auto;
  }
  .rdo-slot-head .slot-dp {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    color: var(--paper);
    letter-spacing: 0.04em;
    opacity: 0.85;
  }
  .rdo-slot-head .stat-view-toggle {
    /* Sits between the DP badge and the MOU chip / Apply button in the header.
       Pin the toggle to the left side after the badge; the MOU chip uses
       margin-left: auto to claim the rest of the space. */
    margin-left: 4px;
  }
  .rdo-slot-head .header-mou-chip {
    /* Pushed toward the right side; sits 15px left of the Apply button (or
       against the right edge if Apply is omitted on the last slot). */
    margin-left: auto;
    margin-right: 15px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--paper);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    line-height: 1.25;
    user-select: none;
  }
  .rdo-slot-head .header-mou-chip .swatch.holiday {
    flex: 0 0 auto;
  }
  .rdo-slot-head .header-mou-chip .mou-text {
    color: rgba(255, 255, 255, 0.85);
  }
  .rdo-slot-head .apply-all-btn {
    background: transparent;
    color: var(--gold-bright);
    border: 1px solid var(--gold-bright);
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .rdo-slot-head .apply-all-btn:hover:not(:disabled) {
    background: var(--gold-bright);
    color: var(--navy);
  }
  .rdo-slot-head .apply-all-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    border-color: rgba(255, 255, 255, 0.3);
    color: rgba(255, 255, 255, 0.5);
  }
  /* On the last DP, render a non-interactive spacer with identical metrics to
     the Apply button so the MOU chip's horizontal position remains anchored to
     the same column as on the preceding DPs. */
  .rdo-slot-head .apply-all-spacer {
    visibility: hidden;
    pointer-events: none;
  }
  .rdo-slot-body {
    padding: 16px;
  }
  .rdo-controls {
    display: flex;
    gap: 16px;
    align-items: flex-end;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .rdo-controls .field { flex: 0 0 auto; }
  .rdo-controls .field input,
  .rdo-controls .field select { min-width: 120px; }

  /* Read-only display row of dispatcher info on the RDO page. Values mirror
     the fields on the Watch BID page; editing happens there. */
  .rdo-officer-display {
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 12px 16px;
    margin-bottom: 18px;
    background: var(--paper-dark);
    border: 1px solid var(--line);
    border-radius: 4px;
    flex-wrap: wrap;
  }
  .rdo-officer-display .rdo-officer-field {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .rdo-officer-display .rdo-officer-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
  }
  .rdo-officer-display .rdo-officer-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-deep);
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.02em;
  }
  .rdo-officer-display .rdo-officer-edit-hint {
    margin-left: auto;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    font-style: italic;
  }

  /* Single RDO stat toggle — clicking cycles 1st → 2nd → both. The view-* classes
     change the accent color so the user can see at a glance which view is active. */
  /* RDO view toggle — two sections side by side:
       LEFT: current view label (top line) + RDO count(s) below
       RIGHT: "click for ..." hint indicating the next view
     The view-* classes color the LEFT border per active view. */
  .stat-view-toggle {
    cursor: pointer;
    user-select: none;
    padding: 6px 12px;
    border: 2px solid transparent;
    border-radius: 4px;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    gap: 16px;
    line-height: 1.25;
  }
  .stat-view-toggle:hover {
    background: rgba(255, 255, 255, 0.08);
  }
  .stat-view-toggle.view-1 { border-color: var(--rdo-light); }
  .stat-view-toggle.view-2 { border-color: #e88a4d; }
  .stat-view-toggle.view-both { border-color: var(--gold-bright); }

  .stat-view-toggle .toggle-current {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 14px;
  }
  .stat-view-toggle .toggle-label {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--gold-bright);
    flex: 0 0 auto;
  }
  .stat-view-toggle .toggle-count {
    font-size: 11px;
    color: var(--paper);
    font-weight: 500;
    line-height: 1.35;
    flex: 1 1 auto;
  }
  .stat-view-toggle .toggle-hint {
    position: relative;
    padding-left: 14px;
    padding-right: 16px; /* room for the › chevron */
    border-left: 1px solid rgba(255, 255, 255, 0.18);
    font-size: 10px;
    color: rgba(255, 255, 255, 0.6);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    line-height: 1.3;
    text-align: left;
    white-space: nowrap;
  }
  .stat-view-toggle .toggle-hint::after {
    content: '›';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-55%);
    font-size: 22px;
    line-height: 1;
    color: rgba(255, 255, 255, 0.5);
  }

  /* Reusable 2-line "Choice" block — appears wherever "1st Choice" / "2nd Choice" /
     "1st & 2nd Choice" is shown. Renders inline-block so it can sit alongside
     surrounding inline text and still occupy 2 centered lines. */
  .choice-block {
    display: inline-block;
    text-align: center;
    vertical-align: middle;
    line-height: 1.1;
  }

  .rdo-info {
    background: var(--navy);
    color: var(--paper);
    padding: 14px 20px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .rdo-info .info-block {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .rdo-info .stat {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .rdo-info .stat .num {
    font-size: 20px;
    font-weight: 600;
    color: var(--gold-bright);
    margin-right: 4px;
  }
  .rdo-info .stat .stat-label-prefix {
    display: inline-block;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: -1px;
  }
  .rdo-info .stat .stat-label-prefix.first { background: var(--rdo-light); }
  .rdo-info .stat .stat-label-prefix.second { background: #e88a4d; }
  .rdo-info .stat.warn .num { color: #ff8a65; }
  .rdo-info .stat.ok .num { color: #8fdc8e; }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .swatch {
    display: inline-block;
    width: 22px;
    height: 22px;
    border: 1px solid var(--line);
    text-align: center;
    line-height: 20px;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 12px;
  }
  .swatch.wide {
    width: 34px;
    font-size: 10px;
    letter-spacing: 0.04em;
  }
  .swatch.work { background: white; }
  .swatch.rdo { background: var(--rdo); color: white; border-color: var(--rdo); }
  .swatch.vac { background: var(--vac); color: white; border-color: var(--vac); }
  .swatch.rdo2 { background: #d97a3d; color: white; border-color: #d97a3d; }
  .swatch.vac2 { background: var(--vac); color: white; border-color: var(--vac); }
  .swatch.split {
    background: linear-gradient(to bottom, var(--rdo) 50%, #d97a3d 50%);
    color: white;
    border-color: var(--ink-soft);
  }
  .swatch.holiday {
    background: white;
    color: #b8941f;
    font-weight: 700;
  }
  .swatch.fed-holiday {
    background: white;
    color: var(--ink-soft);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 16px;
  }
  .day-head {
    background: var(--navy-deep);
    color: var(--gold-bright);
    text-align: center;
    padding: 8px 4px;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .day {
    aspect-ratio: 1 / 1;
    background: white;
    border: 1px solid var(--line);
    cursor: pointer;
    user-select: none;
    display: flex;
    flex-direction: column;
    padding: 6px 8px;
    transition: all 0.1s ease;
    position: relative;
    min-height: 64px;
    overflow: hidden;
  }
  .day:hover {
    border-color: var(--navy);
    transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(10, 31, 61, 0.15);
  }
  .day.weekend { background: var(--weekend); }
  .day .date {
    font-size: 11px;
    color: var(--ink-soft);
    font-weight: 500;
    position: relative;
    z-index: 2;
  }
  .day .num {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    margin-top: 2px;
    position: relative;
    z-index: 2;
  }
  .day .mark {
    position: absolute;
    bottom: 4px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.02em;
    z-index: 2;
    color: white;
    /* Heavy black outline so the code is high-contrast on any background */
    text-shadow:
      -1.2px -1.2px 0 #000,
       1.2px -1.2px 0 #000,
      -1.2px  1.2px 0 #000,
       1.2px  1.2px 0 #000,
       0    -1.2px 0 #000,
       0     1.2px 0 #000,
      -1.2px  0    0 #000,
       1.2px  0    0 #000;
  }
  /* Holiday $ icon in top-right corner */
  .day .holiday-mark {
    position: absolute;
    top: 4px;
    right: 6px;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #b8941f;
    z-index: 3;
    line-height: 1;
    text-shadow: 0 0 2px white, 0 0 2px white;
  }

  /* Diagonal holiday name across cell */
  .day .holiday-name {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 1;
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(184, 148, 31, 0.55);
    transform: rotate(-22deg);
    text-shadow: 0 0 3px rgba(255, 255, 255, 0.9);
    text-align: center;
    line-height: 1.05;
    overflow: hidden;
    padding: 0 2px;
  }
  /* Federal-only holidays (not paid) get a subtler color */
  .day.is-holiday:not(.is-paid-holiday) .holiday-name {
    color: rgba(74, 74, 74, 0.45);
  }
  /* When a state fill is on, brighten so it's still legible over color */
  .day.s1-rdo .holiday-name, .day.s2-rdo .holiday-name,
  .day.s1-vac .holiday-name, .day.s2-vac .holiday-name {
    color: rgba(255, 255, 255, 0.55);
    text-shadow: 0 0 3px rgba(0, 0, 0, 0.4);
  }
  .day.s1-rdo .holiday-mark, .day.s2-rdo .holiday-mark,
  .day.s1-vac .holiday-mark, .day.s2-vac .holiday-mark {
    color: #ffd966;
    text-shadow: 0 0 2px rgba(0,0,0,0.5);
  }

  /* Color layers: cells use background layers for split rendering */
  .day .layer-1, .day .layer-2 {
    position: absolute;
    left: 0;
    right: 0;
    z-index: 0;
    pointer-events: none;
  }
  .day .layer-1 { top: 0; bottom: 0; }
  .day .layer-2 { top: 0; bottom: 0; }

  /* SINGLE VIEW (1st only or 2nd only) — existing single-fill states */
  .day.v-1.s1-rdo, .day.v-2.s2-rdo  { background: var(--rdo); border-color: var(--rdo); }
  .day.v-1.s1-vac { background: var(--vac); border-color: var(--vac); }
  .day.v-1.s1-other { background: #3a3a42; border-color: #3a3a42; }
  .day.v-2.s2-rdo { background: #d97a3d; border-color: #d97a3d; }
  .day.v-2.s2-vac { background: var(--vac); border-color: var(--vac); }
  .day.v-2.s2-other { background: #2a2a32; border-color: #2a2a32; }

  .day.v-1.s1-rdo .date, .day.v-1.s1-rdo .num, .day.v-1.s1-rdo .mark,
  .day.v-1.s1-vac .date, .day.v-1.s1-vac .num, .day.v-1.s1-vac .mark,
  .day.v-1.s1-other .date, .day.v-1.s1-other .num, .day.v-1.s1-other .mark,
  .day.v-2.s2-rdo .date, .day.v-2.s2-rdo .num, .day.v-2.s2-rdo .mark,
  .day.v-2.s2-vac .date, .day.v-2.s2-vac .num, .day.v-2.s2-vac .mark,
  .day.v-2.s2-other .date, .day.v-2.s2-other .num, .day.v-2.s2-other .mark
    { color: white; }

  /* Single-view: hide the active-view's both-mode mark (it's redundant with .mark),
     but show the OTHER choice's mark colored to match its choice — visually indicating
     "this day has the other choice set." */
  .day.v-1 .mark-1, .day.v-2 .mark-2 { display: none !important; }

  /* In 1st-choice view, when the cell has a 2nd-choice mark and no 1st-choice fill,
     render mark-2 in the 2nd-choice orange so it's identifiable.
     Position at top-right so it doesn't collide with .mark (bottom-right). */
  .day.v-1 .mark-2 {
    position: absolute;
    top: 4px;
    right: 6px;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 10px;
    color: var(--rdo2-text, #c66432);
    z-index: 2;
    letter-spacing: 0.02em;
  }
  .day.v-1.s2-rdo .mark-2 { color: #c66432; } /* matches 2nd RDO orange */
  .day.v-1.s2-vac .mark-2 { color: var(--vac); } /* matches Vac color */
  .day.v-1.s2-other .mark-2 { color: #2a2a32; } /* matches 2nd "other" dark gray */
  /* When the cell IS a 1st-choice fill (blue/crimson/dark gray), show the 2nd cross-mark in a
     light contrasting color so it remains visible. */
  .day.v-1.s1-rdo.s2-rdo .mark-2,
  .day.v-1.s1-vac.s2-rdo .mark-2,
  .day.v-1.s1-other.s2-rdo .mark-2 { color: #ffae73; }
  .day.v-1.s1-rdo.s2-vac .mark-2,
  .day.v-1.s1-vac.s2-vac .mark-2,
  .day.v-1.s1-other.s2-vac .mark-2 { color: #ffae73; }
  .day.v-1.s1-rdo.s2-other .mark-2,
  .day.v-1.s1-vac.s2-other .mark-2,
  .day.v-1.s1-other.s2-other .mark-2 { color: #b8b8c0; }

  /* In 2nd-choice view, mark-1 indicates a 1st-choice mark exists, colored in 1st blue */
  .day.v-2 .mark-1 {
    position: absolute;
    top: 4px;
    right: 6px;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 10px;
    color: #1a4d7a;
    z-index: 2;
    letter-spacing: 0.02em;
  }
  .day.v-2.s1-rdo .mark-1 { color: #1a4d7a; }
  .day.v-2.s1-vac .mark-1 { color: var(--vac); }
  .day.v-2.s1-other .mark-1 { color: #3a3a42; } /* matches 1st "other" dark gray */
  /* If the cell is a 2nd-choice fill, lighten the 1st cross-mark to remain visible. */
  .day.v-2.s2-rdo.s1-rdo .mark-1,
  .day.v-2.s2-vac.s1-rdo .mark-1,
  .day.v-2.s2-other.s1-rdo .mark-1 { color: #7fb6ea; }
  .day.v-2.s2-rdo.s1-vac .mark-1,
  .day.v-2.s2-vac.s1-vac .mark-1,
  .day.v-2.s2-other.s1-vac .mark-1 { color: #f0a48a; }
  .day.v-2.s2-rdo.s1-other .mark-1,
  .day.v-2.s2-vac.s1-other .mark-1,
  .day.v-2.s2-other.s1-other .mark-1 { color: #b8b8c0; }

  /* In single view, hide the .mark element if it would overlap with the cross-choice
     indicator. .mark already shows for the active state via JS, in white-on-fill.
     We need to keep it visible only when its own state is set; otherwise hide it. */
  .day.v-1:not(.s1-rdo):not(.s1-vac):not(.s1-other) .mark { display: none; }
  .day.v-2:not(.s2-rdo):not(.s2-vac):not(.s2-other) .mark { display: none; }

  /* BOTH VIEW — split top half = state1, bottom half = state2 */
  .day.v-both .layer-1 { top: 0; bottom: 50%; }
  .day.v-both .layer-2 { top: 50%; bottom: 0; }
  .day.v-both .layer-1.fill-rdo { background: var(--rdo); }
  .day.v-both .layer-1.fill-vac { background: var(--vac); }
  .day.v-both .layer-1.fill-other { background: #3a3a42; }
  .day.v-both .layer-2.fill-rdo { background: #d97a3d; }
  .day.v-both .layer-2.fill-vac { background: var(--vac); }
  .day.v-both .layer-2.fill-other { background: #1f1f25; }

  .day.v-both .date { font-size: 9px; }
  .day.v-both .num { font-size: 13px; line-height: 1; margin-top: 0; }
  .day.v-both .num.has-fill {
    color: white;
    /* 4-direction black outline so white numbers stay legible against any half-fill */
    text-shadow:
      -1px -1px 0 #000,
       1px -1px 0 #000,
      -1px  1px 0 #000,
       1px  1px 0 #000,
       0   -1px 0 #000,
       0    1px 0 #000,
      -1px  0   0 #000,
       1px  0   0 #000;
  }
  .day.v-both .date.has-fill {
    color: rgba(255,255,255,0.95);
    text-shadow:
      -1px -1px 0 #000,
       1px -1px 0 #000,
      -1px  1px 0 #000,
       1px  1px 0 #000;
  }

  .day.v-both .mark-1 {
    position: absolute;
    top: 4px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 11px;
    color: white;
    z-index: 2;
    letter-spacing: 0.02em;
    display: none;
    text-shadow:
      -1px -1px 0 #000,  1px -1px 0 #000,
      -1px  1px 0 #000,  1px  1px 0 #000,
       0   -1px 0 #000,  0    1px 0 #000,
      -1px  0   0 #000,  1px  0   0 #000;
  }
  .day.v-both .mark-2 {
    position: absolute;
    bottom: 3px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: white;
    z-index: 2;
    letter-spacing: 0.02em;
    display: none;
    text-shadow:
      -1px -1px 0 #000,  1px -1px 0 #000,
      -1px  1px 0 #000,  1px  1px 0 #000,
       0   -1px 0 #000,  0    1px 0 #000,
      -1px  0   0 #000,  1px  0   0 #000;
  }
  .day.v-both .mark { display: none; }
  .day.v-both.s1-rdo .mark-1, .day.v-both.s1-vac .mark-1, .day.v-both.s1-other .mark-1,
  .day.v-both.s2-rdo .mark-2, .day.v-both.s2-vac .mark-2, .day.v-both.s2-other .mark-2 { display: block; }

  /* Hover highlight for click halves (both view only) */
  .day.v-both .half-hint-top, .day.v-both .half-hint-bot {
    position: absolute;
    left: 0;
    right: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .day.v-both .half-hint-top { top: 0; bottom: 50%; background: rgba(10, 31, 61, 0.08); }
  .day.v-both .half-hint-bot { top: 50%; bottom: 0; background: rgba(217, 122, 61, 0.12); }
  .day.v-both:hover .half-hint-top { opacity: 0; }
  .day.v-both .day-half-top:hover ~ .half-hint-top { opacity: 1; }

  /* Click target halves (invisible, inside both-view cells) */
  .day-half-top, .day-half-bot {
    position: absolute;
    left: 0;
    right: 0;
    z-index: 4;
    cursor: pointer;
  }
  .day-half-top { top: 0; height: 50%; }
  .day-half-bot { top: 50%; bottom: 0; }

  /* ===== ACTIONS ===== */
  .actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    flex-wrap: wrap;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }
  .btn {
    padding: 12px 28px;
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 2px solid var(--navy);
    background: white;
    color: var(--navy);
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 500;
  }
  .btn:hover { background: var(--paper-dark); }
  .btn.primary {
    background: var(--navy);
    color: white;
  }
  .btn.primary:hover {
    background: var(--navy-deep);
    border-color: var(--navy-deep);
  }
  .btn.primary:disabled {
    background: var(--line);
    border-color: var(--line);
    color: var(--ink-soft);
    cursor: not-allowed;
  }
  .btn.ghost {
    border-color: var(--line);
    color: var(--ink-soft);
  }

  .hidden { display: none !important; }

  /* Long-press / right-click context menu on calendar half-cells */
  .ctx-menu {
    position: fixed;
    background: var(--navy);
    border: 1px solid var(--gold);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    padding: 4px;
    z-index: 200;
    min-width: 220px;
    user-select: none;
  }
  .ctx-menu .ctx-item {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 10px 12px;
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    font-family: 'Oswald', sans-serif;
    transition: background 0.1s;
  }
  .ctx-menu .ctx-item:hover {
    background: rgba(201, 169, 97, 0.18);
  }
  .ctx-menu .ctx-item .ctx-label {
    display: inline-block;
    min-width: 36px;
    text-align: center;
    background: var(--paper);
    color: var(--navy);
    padding: 3px 8px;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.04em;
    border: 1px solid var(--gold);
  }
  .ctx-menu .ctx-item .ctx-name {
    color: var(--paper);
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .ctx-menu .ctx-item.ctx-clear {
    border-top: 1px solid rgba(201, 169, 97, 0.3);
    margin-top: 4px;
    padding-top: 12px;
  }
  .ctx-menu .ctx-item.ctx-clear .ctx-label {
    color: var(--ink-soft);
    background: transparent;
    border-color: var(--ink-soft);
  }
  .ctx-menu .ctx-item.ctx-clear .ctx-name {
    color: var(--ink-soft);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--navy);
    color: white;
    padding: 14px 24px;
    border-left: 4px solid var(--gold);
    font-size: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-left-color: #ff6b35; }

  @media (max-width: 720px) {
    .wrap { padding: 12px 10px 60px; }
    header { padding: 18px 18px; }
    .title-block h1 { font-size: 22px; }
    .picker { padding: 16px; }
    .card { padding: 18px; }
    .field-grid { grid-template-columns: 1fr; }
    /* Mobile 4-col layout. We use 4 equal narrow tracks and assign explicit
       column spans per field so the visual proportions can differ between
       row 1 and row 2 (CSS Grid columns are uniform across rows, but spans
       are per-item). Result:
         Row 1:  Name  Name  Name  Watch         (Watch is 1/4 = half its
                                                   prior 1/2 share; Name takes
                                                   the freed space)
         Row 2:  Serial  Cls   Cls   Cls         (Serial gets a small 1/4
                                                   track sized to its 96-120px
                                                   input; Classification takes
                                                   the rest, beginning right
                                                   at Serial's right edge)
       The trailing .field.full uses its own grid-column: 1/-1 rule so the
       Bid Period dropdown spans all 4 tracks. */
    .field-grid.four-col { grid-template-columns: repeat(4, 1fr); }
    .field-grid.four-col > .field:nth-child(1) { grid-column: span 3; } /* Name */
    .field-grid.four-col > .field:nth-child(2) { grid-column: span 1; } /* Watch */
    .field-grid.four-col > .field:nth-child(3) { grid-column: span 1; } /* Serial */
    .field-grid.four-col > .field:nth-child(4) { grid-column: span 3; } /* Classification */
    .day { min-height: 52px; padding: 4px 5px; }
    .day .num { font-size: 16px; }
    .day .date { font-size: 10px; }
    .day .mark { font-size: 12px; bottom: 2px; }
    .day-head { font-size: 9px; padding: 6px 2px; letter-spacing: 0.08em; }
    .mode-btn { flex: 1; padding: 10px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="picker">
    <span class="picker-label">Bid Type:</span>
    <button class="mode-btn active" data-mode="watch" type="button">Watch Bid</button>
    <button class="mode-btn" data-mode="rdo" type="button">RDO Bid</button>
  </div>

  <!-- ===== WATCH BID FORM ===== -->
  <section id="watch-form" class="card">
    <div class="card-title">Watch Assignment Bid</div>

    <div class="field-grid four-col">
      <div class="field">
        <label for="w-name">Dispatcher Name</label>
        <input type="text" id="w-name" placeholder="Last, First M." autocomplete="name">
      </div>
      <div class="field">
        <label for="w-curwatch">Watch</label>
        <select id="w-curwatch">
          <option value="">—</option>
          <option value="1">Watch 1</option>
          <option value="2">Watch 2</option>
          <option value="3">Watch 3</option>
        </select>
      </div>
      <div class="field">
        <label for="w-serial">Serial №</label>
        <!-- Plain text input. Tapping it pops the OS keyboard on mobile; the
             user types one letter (A–F, auto-uppercased) followed by 4 digits.
             autocapitalize="characters" tells iOS to default to caps. JS in
             the script section enforces position-by-position validation
             (slot 0 must be A–F, slots 1–4 must be 0–9). -->
        <input type="text"
               id="w-serial"
               placeholder="A1234"
               maxlength="5"
               autocapitalize="characters"
               autocomplete="off"
               spellcheck="false"
               pattern="[A-Fa-f][0-9]{4}">
      </div>
      <div class="field">
        <label for="w-rank">Classification</label>
        <select id="w-rank">
          <option value="Communications Information Representative">Communications Information Representative</option>
          <option value="Senior Communications Operator">Senior Communications Operator</option>
          <option value="Principal Communications Operator">Principal Communications Operator</option>
        </select>
      </div>
      <div class="field full">
        <label for="w-startdp">Bid Period (3 DPs)</label>
        <select id="w-startdp"></select>
      </div>
    </div>

    <!-- BID MODE TOGGLE: single period vs full year -->
    <div class="bid-mode-toggle" id="bid-mode-toggle" role="tablist" aria-label="Bid mode">
      <button type="button" class="bm-opt active" data-mode="single" role="tab" aria-selected="true">Single Period</button>
      <button type="button" class="bm-opt" data-mode="fullYear" role="tab" aria-selected="false">Full Year</button>
    </div>

    <!-- Full-year mode: year picker (only DP 1 of selected year) -->
    <div class="field full" id="w-year-wrap" style="display:none; margin-top: 8px;">
      <label for="w-year">Year</label>
      <select id="w-year"></select>
    </div>

    <div class="dp-range" id="w-range">
      <strong>Bid Period:</strong>
      <div class="dp-range-list" id="w-range-list">—</div>
    </div>

    <!-- Single-period watch picker (default) -->
    <div id="watch-single">
      <label style="display:block; margin-bottom: 10px;">Requested Watch Assignment (entire bid period)</label>
      <div class="watch-options">
        <div class="watch-opt" data-w="1">
          <div class="w-num">1</div>
          <div class="w-label">Watch One</div>
          <div class="w-status">— Not Selected —</div>
        </div>
        <div class="watch-opt" data-w="2">
          <div class="w-num">2</div>
          <div class="w-label">Watch Two</div>
          <div class="w-status">— Not Selected —</div>
        </div>
        <div class="watch-opt" data-w="3">
          <div class="w-num">3</div>
          <div class="w-label">Watch Three</div>
          <div class="w-status">— Not Selected —</div>
        </div>
      </div>
    </div>

    <!-- Full-year watch pickers (4 cards, one per DP group) -->
    <div id="watch-fullyear" style="display:none;">
      <label style="display:block; margin-bottom: 10px;">Requested Watch Assignment per DP Group</label>
      <div class="fy-watch-groups" id="fy-watch-groups"><!-- populated by JS --></div>
    </div>

    <div class="field full" style="margin-top: 24px;">
      <label for="w-notes">Comments / Special Considerations (optional)</label>
      <input type="text" id="w-notes" placeholder="e.g. seniority date, schedule preference, etc.">
    </div>

    <div class="actions">
      <button class="btn ghost" type="button" onclick="forgetOfficer()">Forget My Info</button>
      <button class="btn ghost" type="button" onclick="resetWatch()">Reset</button>
      <button class="btn primary" type="button" id="w-submit" onclick="generateWatchPDF()">Generate PDF</button>
    </div>
  </section>

  <!-- ===== RDO BID FORM ===== -->
  <section id="rdo-form" class="card hidden">
    <div class="card-title">RDO Bid</div>

    <!-- Dispatcher info — read-only display, mirrors values entered on the Watch BID page. -->
    <div class="rdo-officer-display">
      <div class="rdo-officer-field">
        <span class="rdo-officer-label">Classification</span>
        <span class="rdo-officer-value" id="r-rank-display">—</span>
      </div>
      <div class="rdo-officer-field">
        <span class="rdo-officer-label">Dispatcher</span>
        <span class="rdo-officer-value" id="r-name-display">—</span>
      </div>
      <div class="rdo-officer-field">
        <span class="rdo-officer-label">Serial #</span>
        <span class="rdo-officer-value" id="r-serial-display">—</span>
      </div>
      <div class="rdo-officer-field">
        <span class="rdo-officer-label">Watch</span>
        <span class="rdo-officer-value" id="r-watch-display">—</span>
      </div>
      <span class="rdo-officer-edit-hint">Edit on Watch BID</span>
    </div>

    <div id="rdo-slots"></div>

    <div class="actions">
      <button class="btn ghost" type="button" onclick="resetRDO()">Reset All Days</button>
      <button class="btn primary" type="button" onclick="generateRDOPDF()">Generate PDF</button>
    </div>
  </section>

</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DP CALENDAR
   Anchor: DP7 = Sunday, June 28, 2026
   13 DPs per year × 28 days = 364 days
   ============================================================ */
const DP_ANCHOR = { dp: 7, year: 2026, start: new Date(2026, 5, 28) };

function getDPInfo(dpNum, year) {
  const yearDiff = year - DP_ANCHOR.year;
  const dpDiff = (dpNum - DP_ANCHOR.dp) + (yearDiff * 13);
  const start = new Date(DP_ANCHOR.start);
  start.setDate(start.getDate() + dpDiff * 28);
  const end = new Date(start);
  end.setDate(end.getDate() + 27);
  return {
    dp: dpNum,
    year: year,
    start: start,
    end: end,
    label: `DP ${dpNum} ${year}`
  };
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function fmtDate(d) {
  return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function fmtMDY(d) {
  return `${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(-2)}`;
}
function fmtDateLong(d) {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return `${days[d.getDay()]}, ${MONTHS_FULL[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

/* ============================================================
   POPULATE DP DROPDOWNS
   ============================================================ */

// Bid mode: "single" (today's default — pick one watch for the bid period) or
// "fullYear" (4 watch picks, one per DP group; RDO panel shows all 13 DPs).
// Declared early because several helper functions (updateWatchRange, getRDOStartDP,
// numDPsInGroup) branch on it.
let bidMode = 'single';
function isFullYear() { return bidMode === 'fullYear'; }

// Watch form: group DPs by year as 1-3, 4-6, 7-9, 10-13. The last group of each
// year contains 4 DPs; all others have 3. Groups never cross a year boundary.
function dpGroupForYearAndStartDP(dpNum) {
  // Returns [startDP, endDP] for the group containing dpNum.
  if (dpNum <= 3) return [1, 3];
  if (dpNum <= 6) return [4, 6];
  if (dpNum <= 9) return [7, 9];
  return [10, 13];
}

function buildWatchDPOptions(selectEl) {
  selectEl.innerHTML = '';
  const now = new Date();

  // Build a list of all groups across the years we care about: from 1 year before
  // the anchor through ~4 years after.
  const groups = [];
  const startYear = DP_ANCHOR.year - 1;
  const endYear = DP_ANCHOR.year + 4;
  for (let yr = startYear; yr <= endYear; yr++) {
    [[1, 3], [4, 6], [7, 9], [10, 13]].forEach(([first, last]) => {
      const dpsInGroup = [];
      for (let dp = first; dp <= last; dp++) dpsInGroup.push(getDPInfo(dp, yr));
      groups.push(dpsInGroup);
    });
  }

  groups.forEach(g => {
    // Skip groups whose final DP ended before today.
    if (g[g.length - 1].end < now) return;
    const opt = document.createElement('option');
    opt.value = `${g[0].dp}-${g[0].year}`;
    const dpLabel = `DP ${g[0].dp}–${g[g.length - 1].dp}`;
    opt.textContent = `${dpLabel} • ${g[0].year} (${fmtDate(g[0].start)} – ${fmtDate(g[g.length - 1].end)})`;
    selectEl.appendChild(opt);
  });

  // Default: anchor's containing group (DP 7-9 of 2026 currently).
  const [anchorFirst] = dpGroupForYearAndStartDP(DP_ANCHOR.dp);
  const defaultVal = `${anchorFirst}-${DP_ANCHOR.year}`;
  const anchorOpt = Array.from(selectEl.options).find(o => o.value === defaultVal);
  if (anchorOpt) anchorOpt.selected = true;
  else if (selectEl.options.length > 0) selectEl.selectedIndex = 0;
}

// RDO form: list every DP individually
function buildDPOptions(selectEl) {
  const now = new Date();
  const currentYear = now.getFullYear();
  const years = [currentYear, currentYear + 1];
  selectEl.innerHTML = '';
  years.forEach(year => {
    for (let dp = 1; dp <= 13; dp++) {
      const info = getDPInfo(dp, year);
      if (info.end < now && !(year === currentYear && dp >= 1)) continue;
      const opt = document.createElement('option');
      opt.value = `${dp}-${year}`;
      opt.textContent = `DP ${dp} • ${year} (${fmtDate(info.start)} – ${fmtDate(info.end)})`;
      if (year === DP_ANCHOR.year && dp === DP_ANCHOR.dp) opt.selected = true;
      selectEl.appendChild(opt);
    }
  });
}

const wStartDP = document.getElementById('w-startdp');
buildWatchDPOptions(wStartDP);

/* ============================================================
   MASTER PICKER
   ============================================================ */
const watchForm = document.getElementById('watch-form');
const rdoForm = document.getElementById('rdo-form');
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.mode === 'watch') {
      watchForm.classList.remove('hidden');
      rdoForm.classList.add('hidden');
    } else {
      watchForm.classList.add('hidden');
      rdoForm.classList.remove('hidden');
    }
  });
});

/* ============================================================
   WATCH FORM — DP RANGE DISPLAY
   ============================================================ */
const wRangeList = document.getElementById('w-range-list');
function updateWatchRange() {
  if (isFullYear()) {
    // In full-year mode the range is implied by the year picker; covers all 13 DPs.
    const yr = +wYearSel.value;
    const first = getDPInfo(1, yr);
    const last = getDPInfo(13, yr);
    wRangeList.innerHTML = `${fmtDate(first.start)} through ${fmtDate(last.end)}<br>` +
      `<span style="font-size:12px;">All 13 DPs of ${yr}</span>`;
    return;
  }
  const [dp, yr] = wStartDP.value.split('-').map(Number);
  const [first, last] = dpGroupForYearAndStartDP(dp);
  const n = last - first + 1;
  const dps = [];
  for (let i = 0; i < n; i++) {
    let curDP = dp + i;
    let curYr = yr;
    if (curDP > 13) { curDP -= 13; curYr += 1; }
    dps.push(getDPInfo(curDP, curYr));
  }
  const rangeStr = `${fmtDate(dps[0].start)} through ${fmtDate(dps[n - 1].end)}`;
  const dpListStr = dps.map(d => `DP ${d.dp}/${d.year}`).join(' • ');
  wRangeList.innerHTML = `${rangeStr}<br><span style="font-size:12px;">${dpListStr}</span>`;
}
wStartDP.addEventListener('change', updateWatchRange);
updateWatchRange();

/* ============================================================
   FULL-YEAR YEAR PICKER + BID MODE TOGGLE
   ============================================================ */
const wYearSel = document.getElementById('w-year');
function buildYearOptions() {
  wYearSel.innerHTML = '';
  const now = new Date();
  // Show years whose DP 13 hasn't ended yet (relevant for a forward-looking bid).
  for (let yr = DP_ANCHOR.year - 1; yr <= DP_ANCHOR.year + 4; yr++) {
    const last = getDPInfo(13, yr);
    if (last.end < now) continue;
    const first = getDPInfo(1, yr);
    const opt = document.createElement('option');
    opt.value = String(yr);
    opt.textContent = `${yr} — ${fmtDate(first.start)} through ${fmtDate(last.end)}`;
    wYearSel.appendChild(opt);
  }
  if (wYearSel.options.length > 0) {
    // Default to the year that contains today, falling back to first available.
    const todayYear = String(now.getFullYear());
    const match = Array.from(wYearSel.options).find(o => o.value === todayYear);
    if (match) match.selected = true;
  }
}
buildYearOptions();
wYearSel.addEventListener('change', () => {
  updateWatchRange();
  rebuildFullYearUI();
  buildAllSlots();
});

const bidModeToggle = document.getElementById('bid-mode-toggle');
const wYearWrap = document.getElementById('w-year-wrap');
const wStartDPWrap = wStartDP.closest('.field');
const watchSingleWrap = document.getElementById('watch-single');
const watchFullYearWrap = document.getElementById('watch-fullyear');

function setBidMode(mode) {
  bidMode = mode;
  bidModeToggle.querySelectorAll('.bm-opt').forEach(b => {
    const isActive = b.dataset.mode === mode;
    b.classList.toggle('active', isActive);
    b.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });
  if (mode === 'fullYear') {
    wStartDPWrap.style.display = 'none';
    wYearWrap.style.display = '';
    watchSingleWrap.style.display = 'none';
    watchFullYearWrap.style.display = '';
    rebuildFullYearUI();
  } else {
    wStartDPWrap.style.display = '';
    wYearWrap.style.display = 'none';
    watchSingleWrap.style.display = '';
    watchFullYearWrap.style.display = 'none';
  }
  updateWatchRange();
  buildAllSlots();
}
bidModeToggle.querySelectorAll('.bm-opt').forEach(btn => {
  btn.addEventListener('click', () => setBidMode(btn.dataset.mode));
});

// Build the 4 per-group watch picker cards (full-year mode).
const fyWatchGroupsEl = document.getElementById('fy-watch-groups');
function rebuildFullYearUI() {
  const yr = +wYearSel.value;
  const groups = [[1, 3], [4, 6], [7, 9], [10, 13]];
  fyWatchGroupsEl.innerHTML = '';
  groups.forEach((range, groupIdx) => {
    const [first, last] = range;
    const startInfo = getDPInfo(first, yr);
    const endInfo = getDPInfo(last, yr);
    const card = document.createElement('div');
    card.className = 'fy-watch-group';
    card.dataset.group = groupIdx;
    card.innerHTML = `
      <div class="fy-head">
        <span class="fy-title">DPs ${first}–${last}</span>
        <span class="fy-range">${fmtDate(startInfo.start)} – ${fmtDate(endInfo.end)}</span>
      </div>
      <div class="watch-options">
        <div class="watch-opt" data-w="1"><div class="w-num">1</div><div class="w-label">Watch One</div><div class="w-status">— Not Selected —</div></div>
        <div class="watch-opt" data-w="2"><div class="w-num">2</div><div class="w-label">Watch Two</div><div class="w-status">— Not Selected —</div></div>
        <div class="watch-opt" data-w="3"><div class="w-num">3</div><div class="w-label">Watch Three</div><div class="w-status">— Not Selected —</div></div>
      </div>`;
    // Wire up the watch picker for this group, mirroring the single-mode picker logic.
    card.querySelectorAll('.watch-opt').forEach(opt => {
      opt.addEventListener('click', () => {
        const w = +opt.dataset.w;
        const st = watchStateGroups[groupIdx];
        const cur = (st.c1 === w) ? '1' : (st.c2 === w) ? '2' : 'off';
        if (cur === 'off') {
          if (st.c1 == null) st.c1 = w; else st.c2 = w;
        } else if (cur === '1') {
          // 1st → 2nd: bump prior 2nd off if any, then promote to 2nd
          if (st.c2 != null) st.c2 = null;
          st.c1 = null;
          st.c2 = w;
        } else {
          // 2nd → off
          st.c2 = null;
        }
        refreshFullYearWatchCard(groupIdx);
      });
    });
    fyWatchGroupsEl.appendChild(card);
    refreshFullYearWatchCard(groupIdx);
  });
}
function refreshFullYearWatchCard(groupIdx) {
  const card = fyWatchGroupsEl.querySelector(`.fy-watch-group[data-group="${groupIdx}"]`);
  if (!card) return;
  const st = watchStateGroups[groupIdx];
  card.querySelectorAll('.watch-opt').forEach(opt => {
    const w = +opt.dataset.w;
    opt.classList.remove('c-1', 'c-2');
    const status = opt.querySelector('.w-status');
    if (st.c1 === w)      { opt.classList.add('c-1'); status.textContent = '1st Choice'; }
    else if (st.c2 === w) { opt.classList.add('c-2'); status.textContent = '2nd Choice'; }
    else                  { status.textContent = '— Not Selected —'; }
  });
}

/* ============================================================
   WATCH 1ST / 2ND CHOICE PICKER
   Each button cycles its own state: off → 1st → 2nd → off.
   Setting a watch to 1st bumps any other watch currently at 1st to off.
   Same rule for 2nd.
   ============================================================ */
// State: { c1: <watch# or null>, c2: <watch# or null> } — used in single-period mode.
const watchState = { c1: null, c2: null };

// Full-year mode state: 4 sets of {c1, c2}, one per DP group (1-3, 4-6, 7-9, 10-13).
const watchStateGroups = [
  { c1: null, c2: null },
  { c1: null, c2: null },
  { c1: null, c2: null },
  { c1: null, c2: null },
];

// Bid mode is declared earlier in the file (before any helpers that branch on it).

document.querySelectorAll('.watch-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    const w = +opt.dataset.w;
    const cur = (watchState.c1 === w) ? '1' : (watchState.c2 === w) ? '2' : 'off';

    if (cur === 'off') {
      // Off → take the next open slot.
      // No 1st? become 1st. Else become 2nd (bumping any existing 2nd off).
      if (watchState.c1 == null) {
        watchState.c1 = w;
      } else {
        watchState.c2 = w;
      }
    } else if (cur === '1') {
      // 1st → demote to 2nd; bump any prior 2nd off.
      watchState.c1 = null;
      watchState.c2 = w;
    } else { // cur === '2'
      // 2nd: if a 1st exists elsewhere, promote this to 1st (and turn that off).
      // Else turn off.
      if (watchState.c1 != null) {
        watchState.c1 = w;
        watchState.c2 = null;
      } else {
        watchState.c2 = null;
      }
    }

    paintWatchPicker();
  });
});

function paintWatchPicker() {
  document.querySelectorAll('.watch-opt').forEach(opt => {
    const w = +opt.dataset.w;
    opt.classList.remove('c-1', 'c-2');
    const status = opt.querySelector('.w-status');
    if (watchState.c1 === w) {
      opt.classList.add('c-1');
      status.textContent = '1ST CHOICE';
    } else if (watchState.c2 === w) {
      opt.classList.add('c-2');
      status.textContent = '2ND CHOICE';
    } else {
      status.textContent = '— Not Selected —';
    }
  });
}

paintWatchPicker();

/* ============================================================
   SERIAL NUMBER VALIDATION
   The serial is one letter (A-F) followed by 4 digits, e.g. A1234. We use a
   plain text input and let the OS keyboard handle entry; the listener below
   position-validates each character so iOS / Android can pop their native
   keyboard without any in-page widget.
   ============================================================ */
const SERIAL_PATTERN = /^[A-F][0-9]{4}$/;

(function setupSerialField() {
  const el = document.getElementById('w-serial');
  if (!el) return;
  el.addEventListener('input', () => {
    const v = el.value.toUpperCase();
    let cleaned = '';
    // Slot 0 must be A-F; slots 1-4 must be 0-9. Anything else is dropped.
    for (let i = 0; i < v.length && cleaned.length < 5; i++) {
      const c = v[i];
      if (cleaned.length === 0) {
        if (/[A-F]/.test(c)) cleaned += c;
      } else {
        if (/[0-9]/.test(c)) cleaned += c;
      }
    }
    if (el.value !== cleaned) el.value = cleaned;
  });
})();

function resetWatch() {
  // Keep officer info (name/serial/rank/current watch) since it's now sticky.
  // Only clear bid-specific fields: notes and the 1st/2nd choice picks.
  document.getElementById('w-notes').value = '';
  watchState.c1 = null;
  watchState.c2 = null;
  paintWatchPicker();
}

/* ============================================================
   RDO BID — multi-DP slot model
   3 slots positioned 2-4 in the page layout.
   Each slot: { include, view, days[28] each with state1/state2 }
   ============================================================ */

// Dynamic per-DP RDO slots. Length is 3 for normal groups, 4 for the year-end
// (DPs 10-13) group. ensureRDOSlots resizes the array preserving any existing
// data when possible.
const rdoSlots = [];
function ensureRDOSlots(n) {
  while (rdoSlots.length < n) rdoSlots.push({ view: '1', days: [] });
  while (rdoSlots.length > n) rdoSlots.pop();
}
ensureRDOSlots(3);

// Holiday helpers. easterDate is unused in the dispatch holiday set (Easter is
// not an LA City civilian paid holiday) but is preserved here for future use.
function easterDate(year) {
  const a = year % 19;
  const b = Math.floor(year / 100);
  const c = year % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const L = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * L) / 451);
  const month = Math.floor((h + L - 7 * m + 114) / 31);
  const day = ((h + L - 7 * m + 114) % 31) + 1;
  return new Date(year, month - 1, day);
}
function nthWeekdayOfMonth(year, month, weekday, n) {
  if (n > 0) {
    const d = new Date(year, month, 1);
    const offset = (weekday - d.getDay() + 7) % 7;
    d.setDate(1 + offset + (n - 1) * 7);
    return d;
  } else {
    const d = new Date(year, month + 1, 0);
    const offset = (d.getDay() - weekday + 7) % 7;
    d.setDate(d.getDate() - offset);
    return d;
  }
}
function getHolidaysForYear(year) {
  const map = new Map();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const add = (d, name, paid) => map.set(fmt(d), { name, paid });
  // LA City civilian paid holidays (LAAC 4.119, MOU 03 + MOU 20 Article 7.5).
  // ALL 13 are paid for dispatch classifications — no federal-only category.
  add(new Date(year, 0, 1), "New Year's Day", true);
  add(nthWeekdayOfMonth(year, 0, 1, 3), "MLK Jr. Day", true);
  add(nthWeekdayOfMonth(year, 1, 1, 3), "Presidents' Day", true);
  add(nthWeekdayOfMonth(year, 2, 1, -1), "Cesar Chavez Day", true);
  add(nthWeekdayOfMonth(year, 4, 1, -1), "Memorial Day", true);
  add(new Date(year, 5, 19), "Juneteenth", true);
  add(new Date(year, 6, 4), "Independence Day", true);
  add(nthWeekdayOfMonth(year, 8, 1, 1), "Labor Day", true);
  add(nthWeekdayOfMonth(year, 9, 1, 2), "Indigenous Peoples Day", true);
  add(new Date(year, 10, 11), "Veterans Day", true);
  // Thanksgiving (Thursday) + Friday after Thanksgiving (Black Friday)
  const thanksgiving = nthWeekdayOfMonth(year, 10, 4, 4);
  add(thanksgiving, "Thanksgiving Day", true);
  const dayAfter = new Date(thanksgiving);
  dayAfter.setDate(dayAfter.getDate() + 1);
  add(dayAfter, "Friday after Thanksgiving", true);
  add(new Date(year, 11, 25), "Christmas Day", true);
  return map;
}
const holidayCache = new Map();
function holidayFor(d) {
  const yr = d.getFullYear();
  if (!holidayCache.has(yr)) holidayCache.set(yr, getHolidaysForYear(yr));
  const key = `${yr}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return holidayCache.get(yr).get(key) || null;
}

// 2-letter codes for holidays — used on the BLANK PDF and legend.
// Picked to avoid collisions with state codes (RDO, VC, M/L, H, JD, FL, SK).
const HOLIDAY_CODES = [
  ["New Year's Day",            "NY"],
  ["MLK Jr. Day",               "MK"],
  ["Presidents' Day",           "PR"],
  ["Cesar Chavez Day",          "CC"],
  ["Memorial Day",              "ME"],
  ["Juneteenth",                "JT"],
  ["Independence Day",          "IN"],
  ["Labor Day",                 "LB"],
  ["Indigenous Peoples Day",    "IP"],
  ["Veterans Day",              "VT"],
  ["Thanksgiving Day",          "TG"],
  ["Friday after Thanksgiving", "FT"],
  ["Christmas Day",             "XD"],
];
const HOLIDAY_CODE_BY_NAME = Object.fromEntries(HOLIDAY_CODES.map(([n,c]) => [n, c]));
function holidayCodeFor(d) {
  const h = holidayFor(d);
  if (!h) return '';
  return HOLIDAY_CODE_BY_NAME[h.name] || '';
}

/* ============================================================
   Determining which DP each slot represents.
   The RDO panel always uses the period set on the Watch BID page (no separate
   selector). In full-year mode, slots 0..12 represent DPs 1..13 of the selected
   year. Otherwise slot N represents the Nth DP within the watch bid group.
   ============================================================ */

function getRDOStartDP() {
  if (isFullYear()) {
    return { dp: 1, year: +wYearSel.value };
  }
  const [dp, yr] = wStartDP.value.split('-').map(Number);
  return { dp, year: yr };
}

// How many DPs are in the currently-selected bid group? In full-year mode this is
// always 13. Otherwise it's the size of the year-quarter group (3, except 4 for
// the year-end DPs 10-13).
function numDPsInGroup() {
  if (isFullYear()) return 13;
  const { dp } = getRDOStartDP();
  const [first, last] = dpGroupForYearAndStartDP(dp);
  return last - first + 1;
}

function getRDOSlotDP(slot) {
  let { dp, year } = getRDOStartDP();
  for (let i = 0; i < slot; i++) ({ dp, year } = nextDP(dp, year));
  return getDPInfo(dp, year);
}

function nextDP(dp, yr) {
  let d = dp + 1, y = yr;
  if (d > 13) { d = 1; y += 1; }
  return { dp: d, year: y };
}

// Sync the RDO slot panels whenever the watch DP changes — they always derive
// their period from the watch bid selection.
wStartDP.addEventListener('change', () => buildAllSlots());

/* ============================================================
   Build the per-slot RDO panels
   ============================================================ */
const rdoSlotsEl = document.getElementById('rdo-slots');

function buildAllSlots() {
  rdoSlotsEl.innerHTML = '';
  const n = numDPsInGroup();
  ensureRDOSlots(n);
  for (let s = 0; s < n; s++) {
    rdoSlotsEl.appendChild(buildSlotPanel(s));
  }
}

function buildSlotPanel(slotIdx) {
  const info = getRDOSlotDP(slotIdx);
  const slot = rdoSlots[slotIdx];
  // Last slot in the bid group has no DPs below it to apply to, so the Apply
  // button is omitted entirely.
  const isLastSlot = slotIdx === numDPsInGroup() - 1;

  // Initialize day data for this slot (preserve existing if same DP)
  const desiredFirstDate = info.start.toDateString();
  const existingFirstDate = slot.days[0] ? slot.days[0].date.toDateString() : null;
  if (desiredFirstDate !== existingFirstDate) {
    slot.days = [];
    for (let i = 0; i < 28; i++) {
      const d = new Date(info.start);
      d.setDate(d.getDate() + i);
      slot.days.push({ date: d, state1: 'work', state2: 'work', holiday: holidayFor(d) });
    }
  }

  const slotEl = document.createElement('div');
  slotEl.className = 'rdo-slot';
  slotEl.dataset.slot = slotIdx;
  slotEl.innerHTML = `
    <div class="rdo-slot-head">
      <span class="slot-label">
        <span class="slot-dp-num">DP ${info.dp}</span>
        <span class="slot-dp-year">${String(info.year).split('').map(c => `<span>${c}</span>`).join('')}</span>
      </span>
      <div class="stat stat-view-toggle" title="Click to cycle through RDO views">
        <div class="toggle-current">
          <div class="toggle-label"></div>
          <div class="toggle-count"></div>
        </div>
        <div class="toggle-hint"></div>
      </div>
      <div class="header-mou-chip" title="MOU 03/20 Paid Holiday — denoted by $ on calendar"><span class="swatch holiday">$</span><span class="mou-text">MOU 03/20<br>Paid Holiday</span></div>
      ${isLastSlot
        ? '<span class="apply-all-btn apply-all-spacer" aria-hidden="true">Apply to all DPs</span>'
        : `<button type="button" class="apply-all-btn" data-slot="${slotIdx}" title="Copy this DP's selections to all DPs below it" disabled>Apply to all DPs</button>`}
    </div>
    <div class="rdo-slot-body">
      <div class="calendar">
        <div class="day-head">Sun</div>
        <div class="day-head">Mon</div>
        <div class="day-head">Tue</div>
        <div class="day-head">Wed</div>
        <div class="day-head">Thu</div>
        <div class="day-head">Fri</div>
        <div class="day-head">Sat</div>
      </div>
    </div>
  `;

  // Wire RDO counters as view targets.
  // Single stat toggle: clicking cycles 1st → 2nd → both → 1st. The label text and
  // class change with each click. The label says: "X/12 RDO (1st)" / "X/12 RDO (2nd)" /
  // "X/12 + Y/12 RDO (Both)" depending on the current view.
  const toggleEl = slotEl.querySelector('.stat-view-toggle');
  if (toggleEl) {
    toggleEl.addEventListener('click', () => {
      const cur = slot.view;
      const next = cur === '1' ? '2' : cur === '2' ? 'both' : '1';
      slot.view = next;
      updateStats(slotIdx);
      applyViewClass(slotIdx);
    });
  }

  // Initial paint
  setTimeout(() => updateStats(slotIdx), 0);

  // Build day cells
  const calendar = slotEl.querySelector('.calendar');
  slot.days.forEach((cd, idx) => {
    const cell = document.createElement('div');
    const dow = cd.date.getDay();
    cell.className = 'day';
    if (dow === 0 || dow === 6) cell.classList.add('weekend');
    if (cd.holiday) {
      cell.classList.add('is-holiday');
      if (cd.holiday.paid) cell.classList.add('is-paid-holiday');
    }
    cell.dataset.idx = idx;
    const showDollar = cd.holiday && cd.holiday.paid;
    cell.innerHTML = `
      <div class="layer-1"></div>
      <div class="layer-2"></div>
      <div class="date">${MONTHS[cd.date.getMonth()]}</div>
      <div class="num">${cd.date.getDate()}</div>
      <div class="mark"></div>
      <div class="mark-1"></div>
      <div class="mark-2"></div>
      ${showDollar ? `<div class="holiday-mark" title="${cd.holiday.name} (paid)">$</div>` : ''}
      ${cd.holiday ? `<div class="holiday-name" title="${cd.holiday.name}">${cd.holiday.name}</div>` : ''}
      <div class="day-half-top" title="1st choice"></div>
      <div class="day-half-bot" title="2nd choice"></div>
    `;
    // Helper: returns the choice (1 or 2) that this half-cell controls based on view.
    const choiceForHalf = (which /* 'top' | 'bot' */) => {
      const v = slot.view;
      if (which === 'top') return (v === '1' || v === 'both') ? 1 : 2;
      else return (v === '2' || v === 'both') ? 2 : 1;
    };
    const wireHalf = (halfEl, which) => {
      let pressTimer = null;
      let pressFired = false;
      const LONG_PRESS_MS = 500;

      // Click / tap → cycle (only if a long-press didn't already fire)
      halfEl.addEventListener('click', e => {
        e.stopPropagation();
        if (pressFired) { pressFired = false; return; }
        cycleDay(slotIdx, idx, choiceForHalf(which));
      });

      // Right-click on desktop → context menu
      halfEl.addEventListener('contextmenu', e => {
        e.preventDefault();
        e.stopPropagation();
        showCtxMenu(e.clientX, e.clientY, slotIdx, idx, choiceForHalf(which));
      });

      // Touch long-press on mobile
      halfEl.addEventListener('touchstart', e => {
        pressFired = false;
        const touch = e.touches[0];
        const x = touch.clientX, y = touch.clientY;
        pressTimer = setTimeout(() => {
          pressFired = true;
          showCtxMenu(x, y, slotIdx, idx, choiceForHalf(which));
        }, LONG_PRESS_MS);
      }, { passive: true });
      const cancelPress = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };
      halfEl.addEventListener('touchend', cancelPress);
      halfEl.addEventListener('touchmove', cancelPress);
      halfEl.addEventListener('touchcancel', cancelPress);
    };
    wireHalf(cell.querySelector('.day-half-top'), 'top');
    wireHalf(cell.querySelector('.day-half-bot'), 'bot');
    calendar.appendChild(cell);
  });

  // Wire up the "Apply to all DPs" button: copies this slot's selections to all
  // other slots, respecting the slot's current view (1st choice / 2nd choice / both).
  const applyAllBtn = slotEl.querySelector('.apply-all-btn');
  if (applyAllBtn) {
    applyAllBtn.addEventListener('click', () => {
      // Safeguard: respect the disabled state set by updateStats() which gates
      // execution on whether RDO counts are in a valid state (0 or 12 only).
      if (applyAllBtn.disabled) return;
      const sourceSlot = rdoSlots[slotIdx];
      const view = sourceSlot.view; // '1', '2', or 'both'
      // Snapshot the source's day-by-day states so the copy stays consistent if
      // the user has the calendar mid-paint.
      const sourceStates = sourceSlot.days.map(d => ({ state1: d.state1, state2: d.state2 }));
      let copiedCount = 0;
      // Copy ONLY to slots BELOW (DPs after) the source slot — not above. So
      // applying from DP 8 affects DPs 9, 10, ... but never DPs 1-7.
      for (let i = slotIdx + 1; i < rdoSlots.length; i++) {
        const target = rdoSlots[i];
        for (let j = 0; j < target.days.length && j < sourceStates.length; j++) {
          if (view === '1') {
            target.days[j].state1 = sourceStates[j].state1;
          } else if (view === '2') {
            target.days[j].state2 = sourceStates[j].state2;
          } else { // 'both'
            target.days[j].state1 = sourceStates[j].state1;
            target.days[j].state2 = sourceStates[j].state2;
          }
        }
        copiedCount++;
      }
      // Refresh all slot UIs to reflect the new state.
      rdoSlots.forEach((_, i) => {
        rdoSlots[i].days.forEach((_, j) => refreshDayCell(i, j));
        updateStats(i);
      });
      const label = view === '1' ? '1st choice' : view === '2' ? '2nd choice' : 'both choices';
      toast(`Applied DP ${getRDOSlotDP(slotIdx).dp} ${label} to ${copiedCount} subsequent DP${copiedCount === 1 ? '' : 's'}`);
    });
  }

  // Apply view class & paint after a microtask so the element exists in DOM
  setTimeout(() => {
    applyViewClass(slotIdx);
    updateStats(slotIdx);
  }, 0);

  return slotEl;
}

/* ============================================================
   DAY STATE DEFINITIONS
   Each calendar half-cell holds one of these states.
   Tap cycles through the 3 primary states (work → rdo → vac → work).
   Long-press / right-click opens the context menu for the 5 less-common ones.
   ============================================================ */
const STATE_DEFS = [
  // code,  ui label, pdf symbol, full name,           css fill class
  ['work', '',       '',         'Clear',              null],
  ['rdo',  'RDO',    'O',        'Regular Day Off',    'fill-rdo'],
  ['vac',  'VC',     'V',        'Vacation',           'fill-vac'],
  ['t',    'T',      'T',        'Training',           'fill-other'],
  ['ml',   'M/L',    'M/L',      'Military Leave',     'fill-other'],
  ['h',    'H',      'H',        'Holiday',            'fill-other'],
  ['jd',   'JD',     'JD',       'Jury Duty',          'fill-other'],
  ['fl',   'FL',     'FL',       'Family Leave',       'fill-other'],
  ['sk',   'SK',     'SK',       'Sick',               'fill-other'],
];
const STATE_BY_CODE = Object.fromEntries(STATE_DEFS.map(s => [s[0], { label: s[1], pdfSym: s[2], name: s[3], fill: s[4] }]));
function stateLabel(code) { return STATE_BY_CODE[code]?.label || ''; }
function statePdfSym(code) { return STATE_BY_CODE[code]?.pdfSym || ''; }
function stateFill(code) { return STATE_BY_CODE[code]?.fill || null; }

// Context menu: codes shown when long-pressing / right-clicking a half-cell.
// T (Training) at top, then M/L, etc.; "Clear" at bottom resets to work.
const CTX_MENU_CODES = ['t', 'ml', 'h', 'jd', 'fl', 'sk', 'work'];

function cycleDay(slotIdx, idx, choice) {
  const cd = rdoSlots[slotIdx].days[idx];
  const key = (choice === 1) ? 'state1' : 'state2';
  const cur = cd[key];
  // If cell is in an "other" state (ml/h/jd/fl/sk), tap clears back to work.
  // Otherwise cycle work → rdo → vac → work.
  if (cur === 'work') cd[key] = 'rdo';
  else if (cur === 'rdo') cd[key] = 'vac';
  else if (cur === 'vac') cd[key] = 'work';
  else cd[key] = 'work'; // any "other" state → clear
  refreshDayCell(slotIdx, idx);
  updateStats(slotIdx);
}

function setDayState(slotIdx, idx, choice, newState) {
  const cd = rdoSlots[slotIdx].days[idx];
  const key = (choice === 1) ? 'state1' : 'state2';
  cd[key] = newState;
  refreshDayCell(slotIdx, idx);
  updateStats(slotIdx);
}

/* Single shared context menu instance; positioned per click */
let ctxMenuEl = null;
function ensureCtxMenu() {
  if (ctxMenuEl) return ctxMenuEl;
  ctxMenuEl = document.createElement('div');
  ctxMenuEl.className = 'ctx-menu hidden';
  document.body.appendChild(ctxMenuEl);
  document.addEventListener('click', e => {
    if (ctxMenuEl && !ctxMenuEl.contains(e.target)) hideCtxMenu();
  });
  return ctxMenuEl;
}
function hideCtxMenu() {
  if (ctxMenuEl) ctxMenuEl.classList.add('hidden');
}
function showCtxMenu(x, y, slotIdx, idx, choice) {
  const menu = ensureCtxMenu();
  menu.innerHTML = '';
  CTX_MENU_CODES.forEach(code => {
    const item = document.createElement('button');
    item.type = 'button';
    item.className = 'ctx-item' + (code === 'work' ? ' ctx-clear' : '');
    const def = STATE_BY_CODE[code];
    item.innerHTML = `<span class="ctx-label">${def.label || '—'}</span><span class="ctx-name">${def.name}</span>`;
    item.addEventListener('click', e => {
      e.stopPropagation();
      setDayState(slotIdx, idx, choice, code);
      hideCtxMenu();
    });
    menu.appendChild(item);
  });
  // Position; clamp to viewport
  menu.classList.remove('hidden');
  const rect = menu.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  let nx = x, ny = y;
  if (nx + rect.width > vw - 4) nx = vw - rect.width - 4;
  if (ny + rect.height > vh - 4) ny = vh - rect.height - 4;
  if (nx < 4) nx = 4;
  if (ny < 4) ny = 4;
  menu.style.left = nx + 'px';
  menu.style.top = ny + 'px';
}

function refreshDayCell(slotIdx, idx) {
  const slotEl = rdoSlotsEl.querySelector(`.rdo-slot[data-slot="${slotIdx}"]`);
  if (!slotEl) return;
  const cell = slotEl.querySelector(`.day[data-idx="${idx}"]`);
  if (!cell) return;
  const cd = rdoSlots[slotIdx].days[idx];

  // Reset all per-state classes
  cell.classList.remove(
    's1-rdo','s1-vac','s1-other',
    's2-rdo','s2-vac','s2-other'
  );
  // State1 class
  if (cd.state1 === 'rdo') cell.classList.add('s1-rdo');
  else if (cd.state1 === 'vac') cell.classList.add('s1-vac');
  else if (cd.state1 !== 'work') cell.classList.add('s1-other');
  // State2 class
  if (cd.state2 === 'rdo') cell.classList.add('s2-rdo');
  else if (cd.state2 === 'vac') cell.classList.add('s2-vac');
  else if (cd.state2 !== 'work') cell.classList.add('s2-other');

  // Layer fill classes
  const l1 = cell.querySelector('.layer-1');
  l1.className = 'layer-1';
  const l1Fill = stateFill(cd.state1);
  if (l1Fill) l1.classList.add(l1Fill);
  const l2 = cell.querySelector('.layer-2');
  l2.className = 'layer-2';
  const l2Fill = stateFill(cd.state2);
  if (l2Fill) l2.classList.add(l2Fill);

  const v = rdoSlots[slotIdx].view;
  cell.querySelector('.mark').textContent =
    v === '1' ? stateLabel(cd.state1) :
    v === '2' ? stateLabel(cd.state2) : '';
  cell.querySelector('.mark-1').textContent = stateLabel(cd.state1);
  cell.querySelector('.mark-2').textContent = stateLabel(cd.state2);

  const num = cell.querySelector('.num');
  const date = cell.querySelector('.date');
  // Date and day number live in the TOP half of the cell. Only color them white when the
  // top half actually has a fill (state1 set). If only state2 is set, the top half is still
  // unfilled white/parchment, so keep the text dark for visibility.
  const topFilled = cd.state1 !== 'work';
  num.classList.toggle('has-fill', topFilled);
  date.classList.toggle('has-fill', topFilled);
}

function applyViewClass(slotIdx) {
  const slotEl = rdoSlotsEl.querySelector(`.rdo-slot[data-slot="${slotIdx}"]`);
  if (!slotEl) return;
  const v = rdoSlots[slotIdx].view;
  slotEl.querySelectorAll('.day').forEach(cell => {
    cell.classList.remove('v-1', 'v-2', 'v-both');
    if (v === '1') cell.classList.add('v-1');
    else if (v === '2') cell.classList.add('v-2');
    else cell.classList.add('v-both');
  });
  rdoSlots[slotIdx].days.forEach((_, i) => refreshDayCell(slotIdx, i));
}

function updateStats(slotIdx) {
  const slotEl = rdoSlotsEl.querySelector(`.rdo-slot[data-slot="${slotIdx}"]`);
  if (!slotEl) return;
  const slot = rdoSlots[slotIdx];
  const days = slot.days;
  const o1 = days.filter(d => d.state1 === 'rdo').length;
  const o2 = days.filter(d => d.state2 === 'rdo').length;
  const view = slot.view;

  const toggle = slotEl.querySelector('.stat-view-toggle');
  if (!toggle) return;
  const labelEl = toggle.querySelector('.toggle-label');
  const countEl = toggle.querySelector('.toggle-count');
  const hintEl = toggle.querySelector('.toggle-hint');

  // Style accents reflect the active view.
  toggle.classList.remove('warn', 'ok', 'view-1', 'view-2', 'view-both');

  // The "Choice" word always appears as a 2-line block: ordinal on top, "Choice"
  // below, both centered. Renders as an inline-block so it can sit inline with
  // surrounding text (e.g. "Click for [block]" or "X of 12 RDOs selected [block]")
  // and still occupy 2 lines.
  const block1 = '<span class="choice-block">1<sup>st</sup><br>Choice</span>';
  const block2 = '<span class="choice-block">2<sup>nd</sup><br>Choice</span>';
  const blockBoth = '<span class="choice-block">1<sup>st</sup> &amp; 2<sup>nd</sup><br>Choice</span>';

  if (view === '1') {
    labelEl.innerHTML = block1;
    countEl.innerHTML = `${o1} of 12 RDOs selected`;
    hintEl.innerHTML = `Click for ${block2}`;
    toggle.classList.add('view-1');
    toggle.classList.toggle('warn', o1 !== 0 && o1 !== 12);
    toggle.classList.toggle('ok', o1 === 12);
  } else if (view === '2') {
    labelEl.innerHTML = block2;
    countEl.innerHTML = `${o2} of 12 RDOs selected`;
