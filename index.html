    hintEl.innerHTML = `Click for ${blockBoth}`;
    toggle.classList.add('view-2');
    toggle.classList.toggle('warn', o2 !== 0 && o2 !== 12);
    toggle.classList.toggle('ok', o2 === 12);
  } else {
    labelEl.innerHTML = blockBoth;
    countEl.innerHTML =
      `${o1} of 12 RDOs (1<sup>st</sup>)<br>` +
      `${o2} of 12 RDOs (2<sup>nd</sup>)`;
    hintEl.innerHTML = `Click for ${block1}`;
    toggle.classList.add('view-both');
    const allOk = o1 === 12 && o2 === 12;
    const anyWarn = (o1 !== 0 && o1 !== 12) || (o2 !== 0 && o2 !== 12);
    toggle.classList.toggle('ok', allOk);
    toggle.classList.toggle('warn', anyWarn);
  }

  // Apply-to-all gating: only allow the button when this slot's RDO counts are
  // in a "valid" state — exactly 0 or 12 in each of 1st/2nd choice. Anything in
  // between (e.g. 7 RDOs in 1st) is mid-edit and shouldn't be propagated.
  const applyBtn = slotEl.querySelector('.apply-all-btn');
  if (applyBtn) {
    const valid = (o1 === 0 || o1 === 12) && (o2 === 0 || o2 === 12);
    applyBtn.disabled = !valid;
    applyBtn.title = valid
      ? "Copy this DP's selections to all DPs below it"
      : 'Set RDO counts to 0 or 12 in each choice before applying to other DPs';
  }
}

function resetRDO() {
  rdoSlots.forEach(slot => {
    slot.days.forEach(d => { d.state1 = 'work'; d.state2 = 'work'; });
  });
  rdoSlots.forEach((_, i) => {
    rdoSlots[i].days.forEach((_, j) => refreshDayCell(i, j));
    updateStats(i);
  });
  toast('All RDO days cleared');
}

buildAllSlots();

/* ============================================================
   PERSIST OFFICER INFO ACROSS SESSIONS
   Saves to localStorage so the form repopulates on next visit.
   Synced fields: name, currentWatch, serial, rank
   ============================================================ */
const OFFICER_STORAGE_KEY = 'lawa-dispatch-bid-officer-v1';

function readOfficer() {
  try {
    const raw = localStorage.getItem(OFFICER_STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}

function writeOfficer(patch) {
  try {
    const cur = readOfficer() || {};
    const merged = { ...cur, ...patch };
    localStorage.setItem(OFFICER_STORAGE_KEY, JSON.stringify(merged));
  } catch (e) {
    // localStorage may be unavailable (private browsing); silently fail
  }
}

// Apply saved officer info to all relevant fields
function applyOfficerToFields() {
  const data = readOfficer();
  if (!data) return;
  const setIfEmpty = (id, val) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (val == null || val === '') return;
    if (el.tagName === 'SELECT') {
      // Only set if value is a valid option
      const has = Array.from(el.options).some(o => o.value === val);
      if (has) el.value = val;
    } else {
      el.value = val;
    }
  };
  // Watch form (the source of truth for officer info)
  setIfEmpty('w-name', data.name);
  setIfEmpty('w-curwatch', data.currentWatch);
  setIfEmpty('w-serial', data.serial);
  setIfEmpty('w-rank', data.rank);
}

// Pull current values from the watch fields and reflect them in the read-only
// display row on the RDO page.
function syncRDODisplay() {
  const name = document.getElementById('w-name').value.trim();
  const serial = document.getElementById('w-serial').value.trim().toUpperCase();
  const watch = document.getElementById('w-curwatch').value;
  const rank = document.getElementById('w-rank').value;
  const rankEl = document.getElementById('r-rank-display');
  const nameEl = document.getElementById('r-name-display');
  const serialEl = document.getElementById('r-serial-display');
  const watchEl = document.getElementById('r-watch-display');
  // Compact label for display — full classification names are long enough to
  // wrap awkwardly in the read-only chip. Use short forms here only.
  const rankShort =
    rank === 'Principal Communications Operator' ? 'Pr. Comm Op' :
    rank === 'Senior Communications Operator'    ? 'Sr. Comm Op' :
    rank === 'Communications Information Representative' ? 'CIR' :
                                                   rank || '—';
  if (rankEl)   rankEl.textContent = rankShort;
  if (nameEl)   nameEl.textContent = name || '—';
  if (serialEl) serialEl.textContent = serial ? `#${serial}` : '—';
  if (watchEl)  watchEl.textContent = watch ? `Watch ${watch}` : '—';
}

// Wire up listeners on the watch fields: persist to localStorage and refresh
// the RDO read-only display row.
function wireOfficerSync() {
  const fields = [
    ['w-name', 'name'],
    ['w-serial', 'serial'],
    ['w-curwatch', 'currentWatch'],
    ['w-rank', 'rank'],
  ];
  fields.forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (!el) return;
    const handler = () => {
      writeOfficer({ [key]: el.value });
      syncRDODisplay();
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
}

applyOfficerToFields();
wireOfficerSync();
syncRDODisplay();

function forgetOfficer() {
  if (!confirm('Clear saved name, serial, classification, and watch from this device?')) return;
  try { localStorage.removeItem(OFFICER_STORAGE_KEY); } catch (e) {}
  ['w-name','w-serial','w-curwatch','w-rank'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.tagName === 'SELECT') {
      const empty = Array.from(el.options).find(o => o.value === '');
      if (empty) el.value = '';
      else if (id === 'w-rank') el.value = 'Communications Information Representative';
      else el.value = el.options[0].value;
    } else {
      el.value = '';
    }
  });
  toast('Saved dispatcher info cleared');
  syncRDODisplay();
}
const toastEl = document.getElementById('toast');
function toast(msg, isError) {
  toastEl.textContent = msg;
  toastEl.classList.toggle('error', !!isError);
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 3200);
}

/* ============================================================
   PDF GENERATION — APD Form 086
   Faithful black-and-white reproduction of the official form.
   Layout (portrait letter, 612 × 792 pt):
     - Title block: "LOS ANGELES AIRPORT POLICE" / "WATCH/DAYS-OFF BID REQUEST"
     - Officer info row: LAST NAME/SERIAL | WATCH | DP#(s) | DP START | DP END
     - Subtitle line: "MARK FIRST AND SECOND CHOICE OF WATCH ASSIGNMENT OR DAYS OFF"
     - Choice row: 1ST CHOICE | 2ND CHOICE | SUPERVISOR'S INITIALS | DATE RECEIVED
     - Day grid: SU M TU W TH F SA × 4 column headers (= 28 cols)
                 Date row(s) — one per DP (3 for watch, 1 for RDO)
                 Mark row(s) — same count as date rows
     - Footer: APD FORM 086 (left) | Symbols legend (right)
   ============================================================ */
const { jsPDF } = window.jspdf;

// ------- shared layout constants --------
const PG_W = 612;
const PG_H = 792;
const PAGE_MARGIN = 18;
const BORDER_GRAY = 90;     // line color for table borders
const FAINT_FILL = 220;     // weekend column shading on PDF — slightly darker for visibility
const WATERMARK_GRAY = 211; // text watermark color (WATCH BID letters, holiday codes) —
                            // slightly darker than FAINT_FILL so the letters read while
                            // still feeling like a faint background mark.


// ----------------- COMBINED APD-086 PDF -----------------
// One portrait page with 4 stacked APD-086 forms:
//   1) Watch BID (3-DP combined, 1st/2nd watch choice in top boxes)
//   2) 1st DP (single 28-day grid, marks from rdoSlots[0])
//   3) 2nd DP (single 28-day grid, marks from rdoSlots[1])
//   4) 3rd DP (single 28-day grid, marks from rdoSlots[2])
// Both the Watch and RDO buttons call this same function.

function generateCombinedPDF() {
  const name = document.getElementById('w-name').value.trim();
  const serial = document.getElementById('w-serial').value.trim().toUpperCase();
  const curWatch = document.getElementById('w-curwatch').value || '';
  const rank = document.getElementById('w-rank').value || 'Communications Information Representative';
  // Short label used in filenames and the "Last name, ABBR" prefix on slips.
  // Each dispatch classification gets a compact 2-3 letter abbreviation.
  const rankAbbr =
    rank === 'Principal Communications Operator' ? 'Pr. CO' :
    rank === 'Senior Communications Operator'    ? 'Sr. CO' :
                                                   'CIR';
  const nameWithRank = `${rankAbbr} ${name}`;

  if (!name) return toast('Dispatcher name required', true);
  if (!serial) return toast('Serial number required', true);
  if (!SERIAL_PATTERN.test(serial)) return toast('Serial must be 1 letter (A–F) + 4 digits', true);

  const numDPs = numDPsInGroup();

  // Validate selections.
  // 1st choice is required when a DP has any selections — must be exactly 12 RDOs.
  // 2nd choice is OPTIONAL — only validate if the user entered any 2nd-choice marks.
  for (let s = 0; s < numDPs; s++) {
    const slot = rdoSlots[s];
    const has1 = slot.days.some(d => d.state1 !== 'work');
    const has2 = slot.days.some(d => d.state2 !== 'work');
    if (!has1 && !has2) continue;
    if (has1) {
      const o1 = slot.days.filter(d => d.state1 === 'rdo').length;
      if (o1 !== 12) return toast(`DP ${getRDOSlotDP(s).dp}: 1st choice needs 12 RDOs (has ${o1})`, true);
    }
    if (has2) {
      const o2 = slot.days.filter(d => d.state2 === 'rdo').length;
      if (o2 !== 12) return toast(`DP ${getRDOSlotDP(s).dp}: 2nd choice needs 12 RDOs (has ${o2})`, true);
    }
  }

  // Determine the DPs in the selected group (single mode) or full year (fullYear mode).
  let dpStart, yrStart;
  if (isFullYear()) {
    dpStart = 1;
    yrStart = +wYearSel.value;
  } else {
    [dpStart, yrStart] = wStartDP.value.split('-').map(Number);
  }
  const dps = [];
  for (let i = 0; i < numDPs; i++) {
    let curDP = dpStart + i;
    let curYr = yrStart;
    if (curDP > 13) { curDP -= 13; curYr += 1; }
    dps.push(getDPInfo(curDP, curYr));
  }

  // Watch choices: in single mode, one pair {c1, c2}. In fullYear mode, four pairs
  // (one per group: 1-3, 4-6, 7-9, 10-13). For email subject and "hasWatchBid" we
  // collapse fullYear to a "did the officer set ANY watch picks?" question.
  let watch1, watch2, hasWatchBid;
  if (isFullYear()) {
    hasWatchBid = watchStateGroups.some(g => g.c1 != null || g.c2 != null);
    // Composite labels reflecting all four group picks (used only as a fallback;
    // the per-slip rendering in full-year mode draws each group's choices directly).
    watch1 = watchStateGroups.map(g => g.c1 != null ? `W${g.c1}` : '—').join('/');
    watch2 = watchStateGroups.map(g => g.c2 != null ? `W${g.c2}` : '—').join('/');
  } else {
    watch1 = watchState.c1 != null ? `Watch ${watchState.c1}` : '';
    watch2 = watchState.c2 != null ? `Watch ${watchState.c2}` : '';
    hasWatchBid = watch1 !== '' || watch2 !== '';
  }
  const symFor = (s) => statePdfSym(s);

  // Determine which forms to render.
  //  - Watch BID slip prints only if at least one watch choice (1st or 2nd) is set.
  //  - DPs are included only if they have any RDO/VC selections.
  const includedDPs = []; // array of slot indices
  for (let s = 0; s < numDPs; s++) {
    const slot = rdoSlots[s];
    if (slot.days.some(d => d.state1 !== 'work' || d.state2 !== 'work')) {
      includedDPs.push(s);
    }
  }

  // Edge case: if nothing is selected, still generate a (mostly empty) PDF and skip
  // the email/share flow entirely. Just download the file. The flag below tells the
  // share routine downstream to bypass email prep.
  const isEmptyBid = !hasWatchBid && includedDPs.length === 0;

  const doc = new jsPDF({ unit: 'pt', format: 'letter', orientation: 'portrait' });

  // Per-slip heights — sized just tall enough for content + legend without leaving
  // empty space below.
  // Per-slip heights. Both Watch BID and RDO slips now have 4 cell rows, so they
  // share an identical 173pt height — symmetric layout, equal bottom-border spacing.
  const FORM_H_WATCH = 173;
  const FORM_H_RDO = 173;

  // Helper: pad mark rows to a target count. Original APD-086:
  //   Watch BID slip = 3 date rows + 1 mark row (the W·A·T·C·H_B·I·D label) = 4 cell rows
  //   RDO slip       = 1 date row + 4 mark rows                             = 5 cell rows
  const padMarks = (markRows, targetCount) => {
    const out = markRows.slice(0, targetCount);
    while (out.length < targetCount) out.push(new Array(28).fill(''));
    return out;
  };

  // Mark row spells out "WATCH BID" with one letter per cell, exactly as on the sample form.
  // Letters at cell indices: 8=W, 9=A, 10=T, 11=C, 12=H, gap at 13-14, 15=B, 16=I, 17=D
  // (BID shifted right by 1 cell so the 'B' falls on Monday, not the shaded Sunday column).
  const watchBidLabelRow = new Array(28).fill('');
  ['W','A','T','C','H'].forEach((ch, i) => watchBidLabelRow[8 + i] = ch);
  ['B','I','D'].forEach((ch, i) => watchBidLabelRow[15 + i] = ch);

  // Build the slip list with page-break support. Each slip records its y, h, and
  // page so the cut-here lines and per-page holiday legend can be placed correctly.
  // Page break: if the next slip would extend below the page bottom, we addPage()
  // and reset cy to the top margin.
  // Two-pass layout: pass 1 defers drawing and just records {h, page, drawFn} for
  // each slip. Pass 2 assigns final Y positions (tight stacking with a small gap
  // between slips for the per-slip holiday legend + cut-here line) and runs the
  // drawFns.
  const slips = []; // { y, h, page, drawFn }
  const pageTopY = (PAGE_MARGIN + 4) / 2; // halved — slips start closer to the top edge
  // Reserve bottom space for the trailing legend on the last slip of a page (~10pt).
  const reservedBottom = 10;
  // Vertical gap between adjacent slips on the same page. Hosts the per-slip
  // holiday legend (~8.5pt baseline below slip) and the cut-here line, plus a
  // few pt of breathing room before the next slip starts.
  // SLIP_GAP: gap between adjacent slips. Holds the per-slip holiday legend
  // (~9pt below slip border) and the cut-here line (~16pt below).
  const SLIP_GAP = 22;
  // Total slot height = slip + gap. Used to compute the fixed Y schedule.
  const SLOT_PITCH = FORM_H_WATCH + SLIP_GAP; // FORM_H_WATCH === FORM_H_RDO === 173
  // How many slots fit on a page given our top margin and reserved bottom?
  const MAX_SLOTS_PER_PAGE = Math.floor((PG_H - reservedBottom - pageTopY + SLIP_GAP) / SLOT_PITCH);

  let cy = pageTopY;
  let pageIdx = 0;
  // Per-page slot counter. Each new page starts at slot 0; slips advance the
  // counter as they're added. There is no special "reserve slot 0 for Watch BID"
  // behavior — if no Watch BID is bid, the first RDO slip simply takes slot 0.
  let pageSlotIdx = 0;

  const addSlip = (h, drawFn, forceNewPage) => {
    if (forceNewPage && slips.length > 0) {
      pageIdx += 1;
      pageSlotIdx = 0;
      cy = pageTopY;
    } else if (cy + h > PG_H - reservedBottom) {
      pageIdx += 1;
      pageSlotIdx = 0;
      cy = pageTopY;
    }
    // Don't draw yet — pass 2 assigns the final Y based on pageSlotIdx and a
    // fixed position schedule (so removing slips doesn't reflow earlier ones).
    slips.push({ y: cy, h, page: pageIdx, drawFn, pageSlotIdx });
    pageSlotIdx += 1;
    cy += h + SLIP_GAP;
  };

  // Helper: build a Watch BID slip for a specific group of DPs. Used both for the
  // single-period Watch BID slip and for each of the 4 mini-slips on a full-year
  // Watch BID page.
  const drawWatchBidSlip = (slipY, slipH, groupDPs, choice1, choice2) => {
    const allDateRows = groupDPs.map(info => {
      const arr = [];
      for (let i = 0; i < 28; i++) {
        const d = new Date(info.start);
        d.setDate(d.getDate() + i);
        arr.push(d);
      }
      return arr;
    });
    // Layout differs by group size:
    //  • 3-DP groups: 3 date rows + 1 dedicated label row (4 total rows). Label
    //    row letters render in light gray.
    //  • 4-DP groups: 3 date rows + 1 hybrid row (DP4 dates merged with the
    //    WATCH BID label letters). Total still 4 rows.
    let dateRows, dateRowLabels, markRows, shadedMarkRowIdxs;
    if (groupDPs.length === 4) {
      dateRows = allDateRows;
      dateRowLabels = [null, null, null, watchBidLabelRow];
      markRows = padMarks([], 0);
      shadedMarkRowIdxs = null;
    } else {
      dateRows = allDateRows;
      dateRowLabels = null;
      markRows = padMarks([ watchBidLabelRow ], 1);
      shadedMarkRowIdxs = [0];
    }
    drawAPD086(doc, slipY, slipH, {
      name: nameWithRank, serial, curWatch,
      dpHeader: 'DP#s',
      dpRange: `${groupDPs[0].dp} - ${groupDPs[groupDPs.length - 1].dp}`,
      startDate: fmtMDDYYYY(groupDPs[0].start),
      endDate: fmtMDDYYYY(groupDPs[groupDPs.length - 1].end),
      firstChoice: choice1,
      secondChoice: choice2,
      dateRows,
      dateRowLabels,
      showLegend: true,
      markRows,
      shadedMarkRowIdxs
    });
  };

  if (isFullYear()) {
    // FULL-YEAR MODE: page 1 has 4 Watch BID mini-slips (one per DP group).
    // RDO pages: each DP gets its own page.
    if (hasWatchBid || isEmptyBid) {
      // Group DPs into the four year-quarter groups: 1-3, 4-6, 7-9, 10-13.
      const groupRanges = [[1, 3], [4, 6], [7, 9], [10, 13]];
      groupRanges.forEach((range, groupIdx) => {
        const [first, last] = range;
        const groupDPs = dps.filter(info => info.dp >= first && info.dp <= last);
        const gState = watchStateGroups[groupIdx];
        const c1 = gState.c1 != null ? `Watch ${gState.c1}` : '';
        const c2 = gState.c2 != null ? `Watch ${gState.c2}` : '';
        addSlip(FORM_H_WATCH, (slipY) => {
          drawWatchBidSlip(slipY, FORM_H_WATCH, groupDPs, c1, c2);
        }, false, true);
      });
    }
  } else {
    // SINGLE-PERIOD MODE: one Watch BID slip covering all DPs in the chosen group.
    if (hasWatchBid || isEmptyBid) {
      addSlip(FORM_H_WATCH, (slipY) => {
        drawWatchBidSlip(slipY, FORM_H_WATCH, dps, watch1, watch2);
      }, false, true);
    }
  }

  // RDO slips: included DPs, OR all DPs in empty-bid hand-fill mode.
  // RDO forms: 1st/2nd CHOICE boxes left blank — they are only used on the Watch BID.
  // In full-year mode, force a page break before each RDO slip (one DP per page).
  const dpIndicesToPrint = isEmptyBid
    ? Array.from({ length: numDPs }, (_, i) => i)
    : includedDPs;
  dpIndicesToPrint.forEach((slotIdx, idxInList) => {
    const slot = rdoSlots[slotIdx];
    const info = dps[slotIdx];
    // In full-year mode with selections, each RDO slip starts on its own page so
    // the officer's marks are easy to read. For a BLANK full-year PDF (hand-fill
    // mode), pack RDO slips 4 per page instead — the natural page-break check
    // will handle pagination based on the fixed slot schedule.
    // The first full-year RDO slip after the Watch BID page always forces a new
    // page so RDOs don't share a page with the Watch BID mini-slips.
    const isFirstRdoAfterWatch = isFullYear() && idxInList === 0 && slips.length > 0;
    const forceNewPage = isFirstRdoAfterWatch || (isFullYear() && !isEmptyBid && slips.length > 0);
    addSlip(FORM_H_RDO, (slipY) => {
      drawAPD086(doc, slipY, FORM_H_RDO, {
        name: nameWithRank, serial, curWatch,
        dpHeader: 'DP#',
        dpRange: String(info.dp),
        startDate: fmtMDDYYYY(info.start),
        endDate: fmtMDDYYYY(info.end),
        firstChoice: '',
        secondChoice: '',
        dateRows: [ slot.days.map(d => d.date) ],
        // Per-slip mini legend at the bottom — RDO slips only (Watch BID slip omits it).
        showLegend: true,
        // Row 2 (0-indexed) carries holiday markers — drawn in gray, not black.
        holidayRowIdxs: [2],
        // Stash the slot index so we can correlate slips back to DPs for the
        // per-page holiday legend below.
        _slotIdx: slotIdx,
        // Dollar-sign watermark — placed on the state2 mark row (one row above
        // the holiday-code row). NOT placed on state1, so each paid holiday day
        // shows exactly one "$" on the slip. Rendered FIRST so any O/V/etc. mark
        // in state2 stamps on top of the $.
        dollarRows: (() => {
          const dr = [null, null, null];
          const paidFlags = slot.days.map(d => {
            const h = holidayFor(d.date);
            return h && h.paid ? '$' : '';
          });
          dr[1] = paidFlags;
          return dr;
        })(),
        markRows: (() => {
          const rows = [ slot.days.map(d => symFor(d.state1)) ];
          const has2 = slot.days.some(d => d.state2 !== 'work');
          if (has2) rows.push(slot.days.map(d => symFor(d.state2)));
          const padded = padMarks(rows, 3);
          // Holiday markers — applied to EVERY RDO slip (real bids and BLANK alike).
          // Row 3 (the bottom row of marks) gets a 2-letter code for any holiday in
          // that column. State1/state2 marks live on rows 1-2, with $ as a watermark
          // behind them on paid MOU holiday days (see dollarRows above).
          padded[2] = slot.days.map(d => holidayCodeFor(d.date));
          return padded;
        })()
      });
    }, forceNewPage);
    // Tag the just-added slip with which DP slot it represents.
    slips[slips.length - 1].slotIdx = slotIdx;
  });

  // Determine which DPs have RDO selections (used for filename, email routing,
  // and the per-page disclaimer printed below the slips).
  const rdoDPs = [];
  rdoSlots.forEach((slot, idx) => {
    if (slot.days.some(d => d.state1 !== 'work' || d.state2 !== 'work')) {
      rdoDPs.push({ dp: dps[idx].dp, year: dps[idx].year });
    }
  });
  const hasAnyRDO = rdoDPs.length > 0;

  // Build recipient list. Dispatch sends every bid (Watch + RDO) to a single
  // mailbox — no per-watch routing, no separate vacation address.
  const recipients = ['APDCommunicationPrincipals@lawa.org'];

  // ---- Pass 2: fixed-position layout. Each slip's Y is determined by its
  // pageSlotIdx according to the schedule pageTopY + pageSlotIdx * SLOT_PITCH.
  // This means removing or omitting slips does NOT reflow the others — slot 1's
  // Y position is the same whether or not slot 0 is present. The bandBottom
  // (cut-here line position) is the start of the NEXT slot, regardless of
  // whether that next slot is occupied.
  if (slips.length > 0) {
    const byPage = {};
    slips.forEach(s => { (byPage[s.page] = byPage[s.page] || []).push(s); });
    const pages = Object.keys(byPage).map(Number).sort((a, b) => a - b);
    pages.forEach((pageNum, ordinal) => {
      if (ordinal > 0) doc.addPage();
      const pageSlips = byPage[pageNum];
      // Sort by pageSlotIdx so the cut-here positioning is computed in slot order.
      pageSlips.sort((a, b) => a.pageSlotIdx - b.pageSlotIdx);
      // Identify the largest slot used on this page; cut-here lines are drawn
      // BETWEEN slips that exist (i.e. only between adjacent occupied slots).
      pageSlips.forEach((s, i) => {
        s.y = pageTopY + s.pageSlotIdx * SLOT_PITCH;
        // bandBottom = the cut-here Y position. It sits ~16pt below this slip's
        // bottom border, which lines up with the start-of-next-slot minus a small
        // breathing room (SLOT_PITCH - 16 = 6pt above the next slot's top edge).
        // Only draw a cut-here below this slip if there's another slip following.
        const next = pageSlips[i + 1];
        s.bandBottom = next ? s.y + s.h + 16 : null;
        s.drawFn(s.y);
      });
    });
  }

  // Dashed "cut here" line at each slip boundary (between adjacent slips on the
  // SAME page only — never across page breaks). The line falls at the band
  // boundary, BELOW the per-slip holiday legend (which lives in the lower portion
  // of each band, just below the slip's outer bottom border).
  for (let i = 0; i < slips.length - 1; i++) {
    if (slips[i].page !== slips[i + 1].page) continue;
    doc.setPage(slips[i].page + 1); // jsPDF pages are 1-indexed
    const lineY = slips[i].bandBottom != null
      ? slips[i].bandBottom
      : slips[i].y + slips[i].h;
    doc.setLineDashPattern([3, 3], 0);
    doc.setDrawColor(140, 140, 140);
    doc.setLineWidth(0.5);
    doc.line(PAGE_MARGIN + 6, lineY, PG_W - PAGE_MARGIN - 6, lineY);
    doc.setLineDashPattern([], 0);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(140, 140, 140);
    const labelText = '✂  cut here';
    const labelW = doc.getTextWidth(labelText) + 8;
    doc.setFillColor(255, 255, 255);
    doc.rect((PG_W - labelW) / 2, lineY - 4, labelW, 8, 'F');
    doc.text(labelText, PG_W / 2, lineY + 2, { align: 'center' });
  }

  // Per-slip holiday legend — each slip with holidays in its 28-day window gets its
  // own mini-legend rendered just below the slip's outer bottom border (4pt of clear
  // space between the border and the legend text top), above the cut-here line.
  const compactHolidayNames = {
    "New Year's Day":            "New Year Day",
    "MLK Jr. Day":               "MLK Day",
    "Presidents' Day":           "Presidents' Day",
    "Cesar Chavez Day":          "Cesar Chavez",
    "Memorial Day":              "Memorial Day",
    "Juneteenth":                "Juneteenth",
    "Independence Day":          "Independence Day",
    "Labor Day":                 "Labor Day",
    "Indigenous Peoples Day":    "Indigenous Peoples",
    "Veterans Day":              "Veterans Day",
    "Thanksgiving Day":          "Thanksgiving",
    "Friday after Thanksgiving": "Day after Thxgvg",
    "Christmas Day":             "Christmas Day",
  };
  slips.forEach(s => {
    if (s.slotIdx === undefined) return; // Watch BID slip — no holiday markers on its rows
    const seen = new Set();
    let anyPaid = false;
    rdoSlots[s.slotIdx].days.forEach(d => {
      const h = holidayFor(d.date);
      if (h) { seen.add(h.name); if (h.paid) anyPaid = true; }
    });
    if (seen.size === 0 && !anyPaid) return;
    const presentEntries = HOLIDAY_CODES.filter(([name]) => seen.has(name));
    const parts = [];
    if (anyPaid) parts.push('$ - Paid MOU Holiday');
    presentEntries.forEach(([n, c]) => parts.push(`${c}-${compactHolidayNames[n] || n}`));
    doc.setPage(s.page + 1); // jsPDF pages are 1-indexed
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(6.5);
    doc.setTextColor(80, 80, 80);
    // Slip's outer bottom border sits at s.y + s.h. We want 4pt of clear space
    // above the legend's cap-top, so baseline ≈ outer_bottom + 4 + cap_height(~4.5pt).
    const legendY = s.y + s.h + 8.5;
    doc.text(parts.join(' · '), PG_W / 2, legendY, { align: 'center' });
  });

  // ---- Filename + email-subject helpers ----
  const lastName = (name || '').split(',')[0].trim() || 'unsigned';
  // Filename-safe abbreviation per dispatch classification.
  const rankShort =
    rank === 'Principal Communications Operator' ? 'Pr CO' :
    rank === 'Senior Communications Operator'    ? 'Sr CO' :
                                                   'CIR';
  const namePart = `${serial || 'X0000'}, ${rankShort} ${lastName}`;

  // Format a list of {dp, year} with year stated only after the LAST DP of each
  // year-run. Year-runs are groups of consecutive DPs that share the same year.
  // Within a year-run, DPs are joined with commas plus an ampersand before the last:
  //   1 DP:    "7"
  //   2 DPs:   "7 & 8"      (ampersand only)
  //   3+ DPs:  "7, 8 & 9"   (commas, ampersand before last)
  // Year-runs are joined with ", ".
  //   [{7,2026},{8,2026},{9,2026}]                   → "7, 8 & 9-2026"
  //   [{7,2026}]                                     → "7-2026"
  //   [{7,2026},{8,2026}]                            → "7 & 8-2026"
  //   [{13,2026},{1,2027},{2,2027}]                  → "13-2026, 1 & 2-2027"
  //   [{7,2026},{9,2026}] (non-contig but same year) → "7 & 9-2026"
  const formatDPGroups = (list) => {
    if (list.length === 0) return '';
    const runs = []; // each: { dps:[...], year }
    list.forEach(item => {
      const last = runs[runs.length - 1];
      if (last && last.year === item.year) last.dps.push(item.dp);
      else runs.push({ dps: [item.dp], year: item.year });
    });
    const joinDPs = (dps) => {
      if (dps.length === 1) return String(dps[0]);
      if (dps.length === 2) return `${dps[0]} & ${dps[1]}`;
      return `${dps.slice(0, -1).join(', ')} & ${dps[dps.length - 1]}`;
    };
    return runs.map(r => `${joinDPs(r.dps)}-${r.year}`).join(', ');
  };

  // Convenience for the singular-vs-plural prefix.
  const dpPrefix = (list) => list.length === 1 ? 'DP' : 'DPs';

  // Edge case: nothing was selected. Save a blank PDF using the same naming convention
  // as a Watch bid, with "BLANK Bids" instead. Skip email/share entirely.
  //   "99395, Sgt Dear, BLANK Bids for DPs 7, 8, 9-2026.pdf"
  if (isEmptyBid) {
    let earlyFilename;
    if (isFullYear()) {
      earlyFilename = `${namePart}, BLANK Full Year Bid - ${yrStart}.pdf`;
    } else {
      const allThreeEarly = dps.map(d => ({ dp: d.dp, year: d.year }));
      earlyFilename = `${namePart}, BLANK Bids for ${dpPrefix(allThreeEarly)} ${formatDPGroups(allThreeEarly)}.pdf`;
    }
    doc.save(earlyFilename);
    toast('PDF generated (no bid data)');
    return;
  }

  // Build filename + email subject using the same year-only-at-end format.
  //   Watch bid:    "99395, Sgt Dear, Watch Bid for DPs 7, 8, 9-2026.pdf"
  //   RDO 1 DP:     "99395, Sgt Dear, RDO Bid for DP 7-2026.pdf"
  //   RDO 2 DPs:    "99395, Sgt Dear, RDO Bid for DPs 7, 8-2026.pdf"
  //   Year cross:   "99395, Sgt Dear, Watch Bid for DPs 13-2026, 1, 2-2027.pdf"
  //   Full year:    "99395, Sgt Dear, Full Year Watch & RDO Bid - 2027.pdf"
  let bidPart;
  if (isFullYear()) {
    bidPart = hasAnyRDO ? `Full Year Watch & RDO Bid - ${yrStart}` : `Full Year Watch Bid - ${yrStart}`;
  } else if (hasAnyRDO) {
    bidPart = `RDO Bid for ${dpPrefix(rdoDPs)} ${formatDPGroups(rdoDPs)}`;
  } else {
    const allThree = dps.map(d => ({ dp: d.dp, year: d.year }));
    bidPart = `Watch Bid for ${dpPrefix(allThree)} ${formatDPGroups(allThree)}`;
  }
  const filename = `${namePart}, ${bidPart}.pdf`;
  const subject = `${namePart}, ${bidPart}`;

  const body = `Submitting my Watch / Days-Off Bid for the period DP ${dps[0].dp}–${dps[dps.length - 1].dp} (${fmtMDDYYYY(dps[0].start)} – ${fmtMDDYYYY(dps[dps.length - 1].end)}).\n\nForm attached.`;

  shareOrFallbackPDF(doc, filename, recipients, subject, body);
}

// Email handoff strategy:
//   • Mobile (Web Share API with file support) → share sheet with PDF attached;
//     recipient is passed via `text` field. If the user cancels, we still open mailto
//     so they get the recipient pre-filled in the To: field.
//   • Desktop (no file-share support) → just download the PDF locally. No mailto,
//     no email prep — the officer attaches and addresses manually from their mail app.
async function shareOrFallbackPDF(doc, filename, recipients, subject, body) {
  const blob = doc.output('blob');
  const file = new File([blob], filename, { type: 'application/pdf' });

  // Detect if we're on an actual mobile device. Web Share API on desktop browsers
  // (Chrome on Windows in particular) reports support but routes through OS share
  // dialogs that mishandle file attachments — producing "no_name" errors when sent
  // to mail clients. Restricting to true mobile UAs avoids this.
  const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

  if (isMobile && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: subject,
        text: `To: ${recipients.join(', ')}\n\n${body}`
      });
      toast('PDF ready to send');
      return;
    } catch (err) {
      // User cancelled the share sheet OR an error — fall through to mailto so they
      // still get the recipient pre-filled in To:.
      const mailto = `mailto:${encodeURIComponent(recipients.join(','))}` +
        `?subject=${encodeURIComponent(subject)}` +
        `&body=${encodeURIComponent(body + `\n\n(Please attach the downloaded ${filename})`)}`;
      window.location.href = mailto;
      setTimeout(() => { doc.save(filename); }, 200);
      toast('PDF downloading — attach it to the email');
      return;
    }
  }

  // Desktop (or any non-mobile context) → just download the PDF. The officer handles
  // emailing themselves.
  doc.save(filename);
  toast('PDF downloaded');
}

function generateWatchPDF() { generateCombinedPDF(); }
function generateRDOPDF() { generateCombinedPDF(); }

// Draw a single APD-086 form block at top-y `y`, occupying height `h`.
// `data` carries: name, serial, curWatch, dpHeader, dpRange, startDate, endDate,
//                 firstChoice, secondChoice, dateRows (Date[][] — one per row),
//                 markRows (string[][] — one per mark row).
function drawAPD086(doc, y, h, data) {
  const xOuter = PAGE_MARGIN;
  const wOuter = PG_W - PAGE_MARGIN * 2;

  // Double border around the form: outer rect with 6pt top/bottom inset, inner rect
  // 5pt inside the outer. Both drawn before content so content sits inside.
  const outerInsetY = 6;
  const innerOffset = 5;
  doc.setDrawColor(0);
  doc.setLineWidth(0.5);
  doc.rect(xOuter, y + outerInsetY, wOuter, h - outerInsetY * 2);
  doc.setLineWidth(0.4);
  doc.rect(xOuter + innerOffset, y + outerInsetY + innerOffset,
           wOuter - innerOffset * 2, h - outerInsetY * 2 - innerOffset * 2);

  // Content sits inside the inner border. Add a small gap (3pt) inside the inner rect.
  const contentPad = 3;
  const x = xOuter + innerOffset + contentPad;
  const w = wOuter - (innerOffset + contentPad) * 2;
  const contentTopY = y + outerInsetY + innerOffset + contentPad;
  const contentBottomY = y + h - outerInsetY - innerOffset - contentPad;

  // Compute internal row heights to fit content area.
  const titleH = 18;     // 2 lines: title + subtitle (centered, with breathing room)
  const officerH = 22;   // 5-column officer info
  const subtitleH = 12;
  // Choice row visually trimmed by 3pt to create breathing space between its
  // bottom border and the day-of-week header below. The "slot" still consumes
  // 22pt of cy advancement so the rest of the layout stays unchanged — the 3pt
  // appears as empty space between the choice row's bottom border and the DOW
  // header's top border.
  const choiceH = 19;
  const choiceGap = 3;
  const headerRowH = 11; // day-of-week header
  const dateRowH = 13;
  const markRowH = 13;

  const nDateRows = data.dateRows.length;
  const nMarkRows = data.markRows.length;

  // Title (2 stacked centered lines), vertically centered in the title block.
  doc.setTextColor(0, 0, 0);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('AIRPORT POLICE DISPATCH', PG_W / 2, contentTopY + 7, { align: 'center' });
  doc.setFontSize(10);
  doc.text('WATCH/DAYS-OFF BID REQUEST', PG_W / 2, contentTopY + 16, { align: 'center' });
  let cy = contentTopY + titleH;

  // Officer info row (5 columns)
  drawOfficerRow(doc, x, cy, w, officerH, data);
  cy += officerH;

  // Subtitle line — centered vertically in the subtitle block.
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.text('MARK FIRST AND SECOND CHOICE OF WATCH ASSIGNMENT OR DAYS OFF',
           PG_W / 2, cy + 8, { align: 'center' });
  cy += subtitleH;

  // 1ST CHOICE | 2ND CHOICE | SUPERVISOR'S INITIALS | DATE RECEIVED row.
  // Drawn at the trimmed height (choiceH); cy then advances by choiceH + choiceGap
  // so the DOW header below is offset by a 3pt breathing space.
  drawChoiceRow(doc, x, cy, w, choiceH, data);
  cy += choiceH + choiceGap;

  // Day-of-week header (28 columns, SU M TU W TH F SA × 4)
  drawDOWHeader(doc, x, cy, w, headerRowH);
  cy += headerRowH;

  const cellW = w / 28;

  // Date rows. data.dateRowLabels (parallel to dateRows) optionally carries a
  // 28-letter label array per row; the row will overlay shaded cells with bold
  // letters (used to merge the WATCH BID label into the 4th DP date row).
  data.dateRows.forEach((dateRow, idx) => {
    const labels = data.dateRowLabels ? data.dateRowLabels[idx] : null;
    drawDateRow(doc, x, cy, w, dateRowH, cellW, dateRow, labels);
    cy += dateRowH;
  });

  // Mark rows (each row of strings becomes its own row of marks). data.holidayRowIdxs
  // (array of 0-based indices) marks which rows should render in muted gray to match
  // the weekend-shading aesthetic — used for the holiday code row and "$" row on
  // RDO slips so they don't compete visually with the officer's selections.
  // data.shadedMarkRowIdxs (set of 0-based indices) marks which rows render with
  // shaded fill behind their letters — used for the WATCH BID label row on 3-DP slips.
  const holidayIdxs = new Set(data.holidayRowIdxs || []);
  const shadedIdxs = new Set(data.shadedMarkRowIdxs || []);
  data.markRows.forEach((markRow, idx) => {
    const isHoliday = holidayIdxs.has(idx);
    const color = isHoliday ? [WATERMARK_GRAY, WATERMARK_GRAY, WATERMARK_GRAY] : null;
    // Optional dollarRow per mark row — paints "$" under cells flagged as paid
    // holidays before the actual mark stamps on top. Used by RDO slips to put $
    // on the state1 / state2 rows whenever the day is a paid MOU holiday.
    const dollarRow = data.dollarRows ? data.dollarRows[idx] : null;
    drawMarkRow(doc, x, cy, w, markRowH, cellW, markRow, color, shadedIdxs.has(idx), isHoliday, dollarRow);
    cy += markRowH;
  });

  // Optional per-slip mini legend, placed just above the inner bottom border.
  if (data.showLegend) {
    // Legend baseline: 3pt below the gap midpoint — shifts the APD FORM stamp and
    // legend slightly DOWN from optical center so they sit closer to (but cleanly
    // above) the inner border.
    const legendY = (cy + contentBottomY) / 2 + 3;
    // "APD FORM 086" stamp — bold, bottom-left of the slip's content area.
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(5.4);
    doc.setTextColor(70, 70, 70);
    doc.text('APD FORM 086', x + 2, legendY);
    // Centered symbol legend.
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(5.4);
    doc.setTextColor(70, 70, 70);
    const legendText = 'O-Regular Day Off · V-Vacation · T-Training · M/L-Military Leave · H-Holiday · JD-Jury Duty · FL-Family Leave · SK-Sick';
    doc.text(legendText, PG_W / 2, legendY, { align: 'center' });
  }
}

function drawOfficerRow(doc, x, y, w, rowH, data) {
  const cw = [w * 0.36, w * 0.10, w * 0.10, w * 0.22, w * 0.22];
  doc.setDrawColor(BORDER_GRAY, BORDER_GRAY, BORDER_GRAY);
  doc.setLineWidth(0.6);
  doc.rect(x, y, w, rowH);
  let cx = x;
  for (let i = 0; i < cw.length - 1; i++) {
    cx += cw[i];
    doc.line(cx, y, cx, y + rowH);
  }
  const headers = ['LAST NAME, FI, SERIAL #:', 'WATCH', data.dpHeader || 'DP#s', 'DP START DATE:', 'DP END DATE:'];
  const values  = [`${data.name}  #${data.serial}`, data.curWatch || '', data.dpRange || '', data.startDate || '', data.endDate || ''];
  cx = x;
  for (let i = 0; i < cw.length; i++) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(6.5);
    doc.setTextColor(0, 0, 0);
    doc.text(headers[i], cx + 3, y + 7);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.text(String(values[i]), cx + cw[i] / 2, y + rowH - 5, { align: 'center' });
    cx += cw[i];
  }
}

function drawChoiceRow(doc, x, y, w, rowH, data) {
  const cw = w / 4;
  doc.setDrawColor(BORDER_GRAY, BORDER_GRAY, BORDER_GRAY);
  doc.setLineWidth(0.6);
  doc.rect(x, y, w, rowH);
  for (let i = 1; i < 4; i++) doc.line(x + cw * i, y, x + cw * i, y + rowH);
  const headers = ['1ST CHOICE', '2ND CHOICE', "SUPERVISOR'S INITIALS", 'DATE RECEIVED'];
  const values  = [data.firstChoice || '', data.secondChoice || '', '', ''];
  for (let i = 0; i < 4; i++) {
    const cx = x + cw * i;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(6.5);
    doc.text(headers[i], cx + 3, y + 8);
    if (values[i]) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.text(String(values[i]), cx + cw / 2, y + rowH - 4, { align: 'center' });
    }
  }
}

function drawDOWHeader(doc, x, y, w, rowH) {
  const cellW = w / 28;
  const dows = ['SU','M','TU','W','TH','F','SA'];
  doc.setFillColor(FAINT_FILL, FAINT_FILL, FAINT_FILL);
  doc.rect(x, y, w, rowH, 'F');
  doc.setDrawColor(BORDER_GRAY, BORDER_GRAY, BORDER_GRAY);
  doc.setLineWidth(0.4);
  doc.rect(x, y, w, rowH);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(6.5);
  doc.setTextColor(0, 0, 0);
  for (let i = 0; i < 28; i++) {
    const cx = x + cellW * i;
    if (i > 0) doc.line(cx, y, cx, y + rowH);
    doc.text(dows[i % 7], cx + cellW / 2, y + 7.5, { align: 'center' });
  }
}

function drawDateRow(doc, x, y, w, rowH, cellW, dateRow, labelLetters) {
  // Shade weekend columns (Sundays at i%7==0, Saturdays at i%7==6) before drawing borders.
  doc.setFillColor(FAINT_FILL, FAINT_FILL, FAINT_FILL);
  for (let i = 0; i < 28; i++) {
    const dow = i % 7;
    if (dow === 0 || dow === 6) {
      doc.rect(x + cellW * i, y, cellW, rowH, 'F');
    }
  }
  doc.setDrawColor(BORDER_GRAY, BORDER_GRAY, BORDER_GRAY);
  doc.setLineWidth(0.4);
  doc.rect(x, y, w, rowH);
  for (let i = 0; i < 28; i++) {
    const cx = x + cellW * i;
    if (i > 0) doc.line(cx, y, cx, y + rowH);
    const d = dateRow[i];
    const hasLabel = labelLetters && labelLetters[i];

    // Pass 1: bold label letter rendered LARGE in light gray (matching the form's
    // header shading), centered in the cell. Cell itself stays white — the gray
    // is in the letter glyphs themselves.
    if (hasLabel) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.setTextColor(WATERMARK_GRAY, WATERMARK_GRAY, WATERMARK_GRAY);
      doc.text(labelLetters[i], cx + cellW / 2, y + 9.5, { align: 'center' });
    }

    // Pass 2: date M/D drawn ON TOP of the gray letter. The gray letter is light
    // enough that the black date reads cleanly without an outline.
    if (d) {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(6);
      doc.setTextColor(0, 0, 0);
      doc.text(`${d.getMonth()+1}/${d.getDate()}`,
               cx + cellW / 2, y + 8.5, { align: 'center' });
    }
  }
}

function drawMarkRow(doc, x, y, w, rowH, cellW, markRow, textColor, shadeMarks, outline, dollarRow) {
  // Shade weekend columns first (matches the date row).
  doc.setFillColor(FAINT_FILL, FAINT_FILL, FAINT_FILL);
  for (let i = 0; i < 28; i++) {
    const dow = i % 7;
    if (dow === 0 || dow === 6) {
      doc.rect(x + cellW * i, y, cellW, rowH, 'F');
    }
  }
  doc.setDrawColor(BORDER_GRAY, BORDER_GRAY, BORDER_GRAY);
  doc.setLineWidth(0.4);
  doc.rect(x, y, w, rowH);
  // shadeMarks renders the letters themselves in light gray (matching the form's
  // header shading) instead of black — used for the WATCH BID label row so it reads
  // as a visual hint rather than a bold mark. Cell fill stays white.
  let [r, g, b] = textColor || [0, 0, 0];
  if (shadeMarks) [r, g, b] = [WATERMARK_GRAY, WATERMARK_GRAY, WATERMARK_GRAY];
  for (let i = 0; i < 28; i++) {
    const cx = x + cellW * i;
    if (i > 0) doc.line(cx, y, cx, y + rowH);

    // Pass 1: paid-holiday "$" watermark. Drawn first so any state mark below
    // stamps ON TOP of it. The "$" is rendered LARGER than the state marks (12pt
    // vs 9pt) so it peeks out around the O on RDO+paid-holiday cells, and gets
    // the same white outline treatment as the holiday codes so it stays legible
    // against gray weekend shading.
    if (dollarRow && dollarRow[i]) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(12);
      // White outline (8 directions, ±1pt)
      doc.setTextColor(255, 255, 255);
      const r0 = 1.0;
      const offsets = [
        [-r0, 0], [r0, 0], [0, -r0], [0, r0],
        [-r0*0.7, -r0*0.7], [r0*0.7, -r0*0.7],
        [-r0*0.7, r0*0.7], [r0*0.7, r0*0.7],
      ];
      offsets.forEach(([dx, dy]) => {
        doc.text('$', cx + cellW / 2 + dx, y + 10 + dy, { align: 'center' });
      });
      // Gray fill on top of the white halo.
      doc.setTextColor(WATERMARK_GRAY, WATERMARK_GRAY, WATERMARK_GRAY);
      doc.text('$', cx + cellW / 2, y + 10, { align: 'center' });
    }

    // Pass 2: the actual mark letter (state1 / state2 / holiday code / WATCH BID).
    const m = markRow[i];
    if (m) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      // Optional white outline around the text — paint the letter ~8 times at small
      // offsets in white before stamping the fill color on top. Used for holiday
      // codes so they pop out against the gray weekend shading.
      if (outline) {
        doc.setTextColor(255, 255, 255);
        const r0 = 1.0; // outline radius in pt (~3px at 200dpi screen)
        const offsets = [
          [-r0, 0], [r0, 0], [0, -r0], [0, r0],
          [-r0*0.7, -r0*0.7], [r0*0.7, -r0*0.7],
          [-r0*0.7, r0*0.7], [r0*0.7, r0*0.7],
        ];
        offsets.forEach(([dx, dy]) => {
          doc.text(m, cx + cellW / 2 + dx, y + 9.5 + dy, { align: 'center' });
        });
      }
      doc.setTextColor(r, g, b);
      doc.text(m, cx + cellW / 2, y + 9.5, { align: 'center' });
    }
  }
}

// Date format helper (MM/DD/YYYY for headers, matches the sample form).
function fmtMDDYYYY(d) {
  return `${d.getMonth() + 1}/${d.getDate()}/${d.getFullYear()}`;
}
